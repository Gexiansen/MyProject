<!-- 多 CDN 自动回退加载器 -->
<script>
(function () {
  var root = document.getElementById('root');
  var msg = document.getElementById('loadmsg');
  function setMsg(t) { if (msg) msg.textContent = t; }
  function showError(t) {
    root.className = 'min-h-screen';
    root.innerHTML =
      '<div style="padding:24px;font-family:-apple-system,sans-serif;color:#334155;line-height:1.7">' +
      '<h2 style="color:#e11d48;margin:0 0 8px">' + t.title + '</h2>' +
      '<p style="margin:6px 0">' + t.body + '</p>' +
      (t.tip ? '<p style="margin:6px 0;color:#64748b;font-size:13px">' + t.tip + '</p>' : '') +
      '</div>';
  }

  // 每个库准备 3 个镜像：jsDelivr（国内较快）→ cdnjs → unpkg
  var libs = [
    { global: 'React', urls: [
      'https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js',
      'https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js',
      'https://unpkg.com/react@18.3.1/umd/react.production.min.js' ] },
    { global: 'ReactDOM', urls: [
      'https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js',
      'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js',
      'https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js' ] },
    { global: 'PropTypes', urls: [
      'https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js',
      'https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js',
      'https://unpkg.com/prop-types@15.8.1/prop-types.min.js' ] },
    { global: 'Recharts', urls: [
      'https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.min.js',
      'https://unpkg.com/recharts@2.12.7/umd/Recharts.min.js',
      'https://cdn.jsdelivr.net/npm/recharts@2.10.4/umd/Recharts.min.js' ] },
    { global: 'Babel', urls: [
      'https://cdn.jsdelivr.net/npm/@babel/standalone@7.24.7/babel.min.js',
      'https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js',
      'https://unpkg.com/@babel/standalone@7.24.7/babel.min.js' ] },
  ];

  function loadOne(lib, idx, done) {
    if (idx >= lib.urls.length) { done(new Error(lib.global)); return; }
    var s = document.createElement('script');
    s.src = lib.urls[idx];
    s.onload = function () {
      if (window[lib.global]) done(null);
      else loadOne(lib, idx + 1, done); // 下载成功但没建立全局变量，试下一个镜像
    };
    s.onerror = function () { loadOne(lib, idx + 1, done); };
    document.head.appendChild(s);
  }

  function loadAll(i) {
    if (i >= libs.length) { start(); return; }
    if (window[libs[i].global]) { loadAll(i + 1); return; }
    setMsg('正在加载 ' + libs[i].global + '…');
    loadOne(libs[i], 0, function (err) {
      if (err) {
        showError({
          title: '无法加载「' + err.message + '」',
          body: '三个镜像（jsDelivr / cdnjs / unpkg）都下载失败，通常是网络不通或被拦截。',
          tip: '请确认设备已联网后刷新；若在公司/校园网或使用了代理，可临时关闭代理再试。'
        });
        return;
      }
      loadAll(i + 1);
    });
  }

  function start() {
    setMsg('正在渲染…');
    try {
      window.Babel.transformScriptTags(); // 手动触发编译（动态加载后不会自动执行）
    } catch (e) {
      showError({ title: '页面编译失败', body: String(e && e.message || e) });
    }
  }

  loadAll(0);
})();
</script>

// ---------- 工具 ----------

function makeRng(seed) {
  let s = seed;
  return () => { s = (s * 1664525 + 1013904223) % 4294967296; return s / 4294967296; };
}
function nextMonth(key) {
  let [y, m] = key.split('-').map(Number);
  m += 1; if (m > 12) { m = 1; y += 1; }
  return `${y}-${String(m).padStart(2, '0')}`;
}
function monthIndexFromKey(key) {
  const [year, month] = String(key || '').split('-').map(Number);
  return Number.isFinite(year) && Number.isFinite(month) ? year * 12 + month - 1 : null;
}
function resolveGoalCurrentAmount(goal, rec) {
  const linkedAccountIds = Array.isArray(goal.linkedAccountIds) ? goal.linkedAccountIds : [];
  if (!linkedAccountIds.length) return Math.max(0, Number(goal.currentAmount) || 0);
  return linkedAccountIds.reduce((sum, accountId) => sum + (Number(rec?.[accountId]) || 0), 0);
}
function getGoalProgress(goal, currentMonthIndex, resolvedCurrentAmount) {
  const targetAmount = Number(goal.targetAmount) || 0;
  const currentAmount = resolvedCurrentAmount == null ? Math.max(0, Number(goal.currentAmount) || 0) : Math.max(0, Number(resolvedCurrentAmount) || 0);
  const gap = Math.max(0, targetAmount - currentAmount);
  const [targetYear, targetMonth] = String(goal.targetDate || '').split('-').map(Number);
  const targetMonthIndex = targetYear * 12 + targetMonth - 1;
  const monthsLeft = Number.isFinite(targetMonthIndex) ? targetMonthIndex - currentMonthIndex : 0;
  return {
    targetAmount, currentAmount, gap, monthsLeft,
    monthlyNeed: gap === 0 ? 0 : monthsLeft > 0 ? gap / monthsLeft : null,
    progress: targetAmount > 0 ? currentAmount / targetAmount : 0,
  };
}
function actionMetricChange(metric, before, after) {

  if (metric === 'cash') return after.cash - before.cash;
  if (metric === 'liability') return before.liab - after.liab;

// ---------- 演示数据 ----------
function buildDemo() {
  const accounts = [
    { id: 'a_cash1', name: '招商银行活期', type: 'asset', category: 'cash', member: '共同', active: true },
    { id: 'a_cash2', name: '余额宝', type: 'asset', category: 'cash', member: '老婆', active: true },
    { id: 'a_xpeng', name: '小鹏股票', type: 'asset', category: 'investment', member: '老公', active: true },
    { id: 'a_index', name: '指数基金定投', type: 'asset', category: 'investment', member: '共同', active: true },
    { id: 'a_house', name: '自住房', type: 'asset', category: 'fixed', member: '共同', active: true },
    { id: 'l_mortgage', name: '房贷', type: 'liability', member: '共同', active: true },
    { id: 'l_card', name: '信用卡', type: 'liability', member: '老公', active: true },
    { id: 'i_husband', name: '老公工资', type: 'income', member: '老公', active: true },
    { id: 'i_wife', name: '老婆工资', type: 'income', member: '老婆', active: true },
    { id: 'e_mortgage', name: '房贷月供', type: 'expense', isFixed: true, fixedAmount: 10000, member: '共同', active: true },
    { id: 'e_property', name: '物业+车位', type: 'expense', isFixed: true, fixedAmount: 800, member: '共同', active: true },
    { id: 'e_edu', name: '孩子教育', type: 'expense', isFixed: true, fixedAmount: 3000, member: '共同', active: true },
    { id: 'e_daily', name: '日常开销', type: 'expense', isFixed: false, fixedAmount: 0, member: '共同', active: true },
  ];

  const rng = makeRng(20240115);
  const months = [];
  let d = new Date(2024, 0, 1);
  for (let i = 0; i < 30; i++) {
    months.push(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`);
    d.setMonth(d.getMonth() + 1);
  }

  let cash1 = 80000, cash2 = 40000, xpeng = 120000, index = 60000;
  let house = 2000000, mortgage = 1500000;
  const records = {};

  months.forEach((m, i) => {
    const monthNum = Number(m.split('-')[1]);
    const bonus = monthNum === 12 ? 60000 : 0;
    const husband = 20000 + bonus + Math.round((rng() - 0.5) * 2000);
    const wife = 15000 + Math.round((rng() - 0.5) * 1500);
    const daily = 8000 + Math.round(rng() * 6000);
    const mortgagePay = 10000, property = 800, edu = 3000;
    const totalIncome = husband + wife;
    const totalExpense = mortgagePay + property + edu + daily;
    const saved = totalIncome - totalExpense;

    index = index * (1 + (rng() - 0.48) * 0.05) + 5000;
    if (i % 3 === 0) xpeng += 20000;
    xpeng = xpeng * (1 + (rng() - 0.45) * 0.12);
    cash1 += saved - 5000 - (i % 3 === 0 ? 20000 : 0);
    if (cash1 < 20000) cash1 = 20000 + rng() * 10000;
    cash2 = cash2 * 1.002;
    house = house * 1.0008;
    mortgage -= 4000;
    const card = Math.round(rng() * 14000);

    records[m] = {
      a_cash1: Math.round(cash1),
      a_cash2: Math.round(cash2),
      a_xpeng: Math.round(xpeng),
      a_index: Math.round(index),
      a_house: Math.round(house),
      l_mortgage: Math.round(mortgage),
      l_card: card,
      i_husband: husband,
      i_wife: wife,
      e_mortgage: mortgagePay,
      e_property: property,
      e_edu: edu,
      e_daily: daily,
    };
  });

  return { accounts, records };
}

// ---------- 主组件 ----------
function FamilyFinance({ onChangePassword }) {
  const demo = useMemo(buildDemo, []);
  const saved = useMemo(loadSaved, []);

  const [accounts, setAccounts] = useState(() =>
    saved ? saved.accounts.map((a) => ({ ...a, active: a.active !== false })) : demo.accounts.map((a) => ({ ...a }))
  );
  const [records, setRecords] = useState(() => saved ? saved.records : { ...demo.records });
  const [withdrawalRate, setWithdrawalRate] = useState(() => (saved && saved.withdrawalRate) ? saved.withdrawalRate : 4);
  const [monthStatus, setMonthStatus] = useState(() =>
    saved && saved.monthStatus && typeof saved.monthStatus === 'object' ? saved.monthStatus : {}
  );
  const [goals, setGoals] = useState(() => saved && Array.isArray(saved.goals) ? saved.goals : []);
  const [monthMeta, setMonthMeta] = useState(() => saved && saved.monthMeta && typeof saved.monthMeta === 'object' ? saved.monthMeta : {});
  const [goalHistory, setGoalHistory] = useState(() => saved && saved.goalHistory && typeof saved.goalHistory === 'object' ? saved.goalHistory : {});
  const [lastExportAt, setLastExportAt] = useState(() => saved?.lastExportAt || null);
  const [tab, setTab] = useState('overview');
  const [range, setRange] = useState('1y');
  const [saveStatus, setSaveStatus] = useState('');
  const [resetOpen, setResetOpen] = useState(false);
  const [passwordOpen, setPasswordOpen] = useState(false);
  const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
  const fileRef = useRef(null);

  useEffect(() => {
    try {
      const payload = JSON.stringify({ accounts, records, withdrawalRate, monthStatus, goals, monthMeta, goalHistory, lastExportAt });
      localStorage.setItem(STORAGE_KEY, payload);
      if (localStorage.getItem(STORAGE_KEY) !== payload) throw new Error('保存校验失败');
      setSaveStatus('saved');
      const t = setTimeout(() => setSaveStatus(''), 1500);
      return () => clearTimeout(t);
    } catch (e) { setSaveStatus('error'); }
  }, [accounts, records, withdrawalRate, monthStatus, goals, monthMeta, goalHistory, lastExportAt]);

  const series = useMemo(() => {
    const sorted = Object.keys(records).sort();
    const out = [];
    let prevNW = null;
    sorted.forEach((m, monthIndex) => {
      const rec = records[m] || {};
      const previousRec = monthIndex > 0 ? (records[sorted[monthIndex - 1]] || {}) : null;
      let assets = 0, liab = 0, inc = 0, exp = 0, invest = 0, cash = 0, fixed = 0;
      let topInv = 0, topInvName = '';
      accounts.forEach((a) => {
        let v = rec[a.id];
        if (v == null) v = (a.type === 'expense' && a.isFixed && isActive(a)) ? a.fixedAmount : 0;
        v = Number(v) || 0;
        if (a.type === 'asset') {
          assets += v;
          if (a.category === 'investment') { invest += v; if (v > topInv) { topInv = v; topInvName = a.name; } }
          else if (a.category === 'cash') cash += v;
          else fixed += v;
        } else if (a.type === 'liability') liab += v;
        else if (a.type === 'income') inc += v;
        else if (a.type === 'expense') exp += v;
      });
      const nw = assets - liab;
      const saved = inc - exp;
      const nonCashChange = prevNW == null ? 0 : nw - prevNW - saved;
      const netChange = prevNW == null ? null : nw - prevNW;
      const drivers = previousRec ? accounts
        .filter((a) => a.type === 'asset' || a.type === 'liability')
        .map((a) => {
          const current = Number(rec[a.id]) || 0;
          const previous = Number(previousRec[a.id]) || 0;
          const contribution = a.type === 'liability' ? previous - current : current - previous;
          return {
            accountId: a.id,
            name: `${a.member} · ${a.name}`,
            type: a.type,
            contribution,
            reason: monthMeta[m]?.changeReasons?.[a.id] || '',
          };
        })
        .filter((d) => d.contribution !== 0)
        .sort((a, b) => Math.abs(b.contribution) - Math.abs(a.contribution)) : [];
      out.push({
        month: m, label: m.slice(2), assets, liab, nw, inc, exp, saved, nonCashChange, netChange, drivers,
        invest, cash, fixed, concentration: invest > 0 ? topInv / invest : 0, topInvName,
      });
      prevNW = nw;
    });
    return out;
  }, [accounts, records, monthMeta]);

  const latest = series[series.length - 1];

  const chartData = useMemo(() => {
    if (range === 'all' || !latest) return series;
    return series.slice(-12);
  }, [series, range, latest]);

  const fire = useMemo(() => {
    if (!latest) return { progress: 0, passive: 0, annualExp: 0, target: 0, years: null, invest: 0, remaining: 0, passiveGap: 0, coverageMonths: 0, targetMonth: null };
    const last12 = series.slice(-12);
    const avgExp = last12.reduce((s, x) => s + x.exp, 0) / last12.length;
    const avgSaved = last12.reduce((s, x) => s + x.saved, 0) / last12.length;
    const annualExp = avgExp * 12;
    const annualSaved = avgSaved * 12;
    const rate = withdrawalRate / 100;
    const invest = latest.invest;
    const passive = invest * rate;
    const target = rate > 0 ? annualExp / rate : 0;
    const progress = annualExp ? passive / annualExp : 0;
    const years = target <= invest ? 0 : (annualSaved > 0 ? (target - invest) / annualSaved : null);
    const remaining = Math.max(0, target - invest);
    const passiveGap = Math.max(0, annualExp - passive);
    const coverageMonths = annualExp > 0 ? progress * 12 : 0;
    let targetMonth = null;
    if (years != null) {
      const [year, month] = latest.month.split('-').map(Number);
      const monthIndex = year * 12 + month - 1 + Math.ceil(years * 12);
      targetMonth = `${Math.floor(monthIndex / 12)}-${String(monthIndex % 12 + 1).padStart(2, '0')}`;
    }
    return { progress, passive, annualExp, annualSaved, target, years, invest, remaining, passiveGap, coverageMonths, targetMonth };
  }, [series, latest, withdrawalRate]);

  const cashflow = useMemo(() => {
    const last3 = series.slice(-3);
    const predIncome = last3.length ? last3.reduce((s, x) => s + x.inc, 0) / last3.length : 0;
    const fixedExp = accounts
      .filter((a) => a.type === 'expense' && a.isFixed && isActive(a))
      .reduce((s, a) => s + (Number(a.fixedAmount) || 0), 0);
    return { predIncome, fixedExp, disposable: predIncome - fixedExp };
  }, [series, accounts]);

  const annual = useMemo(() => {
    const byYear = {};
    series.forEach((s) => { const y = s.month.slice(0, 4); (byYear[y] = byYear[y] || []).push(s); });
    const years = Object.keys(byYear).sort();
    let prevEnd = null;
    return years.map((y) => {
      const arr = byYear[y];
      const last = arr[arr.length - 1];
      const savedSum = arr.reduce((s, x) => s + x.saved, 0);
      const nonCashChangeSum = arr.reduce((s, x) => s + x.nonCashChange, 0);
      const incSum = arr.reduce((s, x) => s + x.inc, 0);
      const expSum = arr.reduce((s, x) => s + x.exp, 0);
      const prevNW = prevEnd ? prevEnd.nw : null;
      const prevLiab = prevEnd ? prevEnd.liab : arr[0].liab;
      const res = {
        year: y, netWorth: last.nw, saved: savedSum, nonCashChange: nonCashChangeSum, growth: savedSum + nonCashChangeSum,
        income: incSum, expenses: expSum, savingsRate: incSum ? savedSum / incSum : 0,
        totalAssets: last.assets, liabilities: last.liab, debtReduced: prevLiab - last.liab,
        concentration: last.concentration,
        yoyAbs: prevNW != null ? last.nw - prevNW : null,
        yoyPct: prevNW ? (last.nw - prevNW) / prevNW : null,
      };
      prevEnd = last;
      return res;
    });
  }, [series]);

  const exportData = () => {
    const exportedAt = new Date().toISOString();
    const blob = new Blob([JSON.stringify({ accounts, records, withdrawalRate, monthStatus, goals, monthMeta, goalHistory, lastExportAt: exportedAt }, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `family-finance-${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    setLastExportAt(exportedAt);
  };
  const importData = (e) => {
    const f = e.target.files?.[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const obj = JSON.parse(reader.result);
        if (obj.accounts) setAccounts(obj.accounts.map((a) => ({ ...a, active: a.active !== false })));
        if (obj.records) setRecords(obj.records);
        if (obj.withdrawalRate) setWithdrawalRate(obj.withdrawalRate);
        setMonthStatus(obj.monthStatus && typeof obj.monthStatus === 'object' ? obj.monthStatus : {});
        setGoals(Array.isArray(obj.goals) ? obj.goals : []);
        setMonthMeta(obj.monthMeta && typeof obj.monthMeta === 'object' ? obj.monthMeta : {});
        setGoalHistory(obj.goalHistory && typeof obj.goalHistory === 'object' ? obj.goalHistory : {});
        setLastExportAt(obj.lastExportAt || null);
      } catch { /* ignore */ }
    };
    reader.readAsText(f);
    e.target.value = '';
  };

  const restoreDemo = () => {
    setAccounts(demo.accounts.map((a) => ({ ...a })));
    setRecords({ ...demo.records });
    setWithdrawalRate(4);
    setMonthStatus({});
    setGoals([]);
    setMonthMeta({});
    setGoalHistory({});
    setLastExportAt(null);
    setResetOpen(false);
    setTab('overview');
  };
  const clearAll = () => {
    setAccounts([]);
    setRecords({});
    setMonthStatus({});
    setGoals([]);
    setMonthMeta({});
    setGoalHistory({});
    setLastExportAt(null);
    setResetOpen(false);
    setTab('accounts');
  };

  const tabs = [
    { key: 'overview', label: '总览', icon: Home },
    { key: 'accounts', label: '账户管理', icon: ListChecks },
    { key: 'closing', label: '月度结账', icon: CalendarClock },
    { key: 'goals', label: '家庭目标', icon: Target },
    { key: 'annual', label: '年度小结', icon: BarChart3 },
  ];

  return (
    <div className="min-h-screen bg-slate-100 text-slate-800">
      <header className="bg-white border-b border-slate-200 sticky top-0 z-20">
        <div className="max-w-4xl mx-auto px-4 py-3 flex flex-wrap items-center justify-between gap-2">
          <div className="flex items-center gap-2">
            <PiggyBank className="w-6 h-6 text-indigo-600" />
            <h1 className="font-bold text-lg">家庭财务</h1>
            {saveStatus === 'saved' && <span className="text-xs text-emerald-600 ml-1">已保存 ✓</span>}
            {saveStatus === 'error' && <span className="text-xs text-rose-600 ml-1">本机保存失败</span>}
          </div>
          <div className="ml-auto hidden sm:flex flex-wrap items-center justify-end gap-2">
            <button onClick={exportData} className="flex items-center gap-1 text-xs px-2 py-1.5 rounded-md bg-slate-100 hover:bg-slate-200">
              <Upload className="w-4 h-4" /> 导出
            </button>
            <button onClick={() => fileRef.current?.click()} className="flex items-center gap-1 text-xs px-2 py-1.5 rounded-md bg-slate-100 hover:bg-slate-200">
              <Download className="w-4 h-4" /> 导入
            </button>
            <button onClick={() => setResetOpen(true)} className="flex items-center gap-1 text-xs px-2 py-1.5 rounded-md bg-slate-100 hover:bg-slate-200">
              <Power className="w-4 h-4" /> 重置
            </button>
            <button onClick={() => setPasswordOpen(true)} className="flex items-center gap-1 text-xs px-2 py-1.5 rounded-md bg-slate-100 hover:bg-slate-200">
              <Lock className="w-4 h-4" /> 改密码
            </button>
            <input ref={fileRef} type="file" accept=".json,application/json" onChange={importData} className="hidden" />
          </div>
        </div>
        <div className="max-w-4xl mx-auto px-2 hidden sm:flex gap-1 overflow-x-auto">
          {tabs.map((t) => {
            const Icon = t.icon;
            return (
              <button key={t.key} onClick={() => setTab(t.key)}
                className={`flex items-center gap-1 px-3 py-2 text-sm whitespace-nowrap border-b-2 ${tab === t.key ? 'border-indigo-600 text-indigo-600 font-medium' : 'border-transparent text-slate-500'}`}>
                <Icon className="w-4 h-4" /> {t.label}
              </button>
            );
          })}
        </div>
        <div className="max-w-4xl mx-auto px-2 grid grid-cols-4 gap-1 sm:hidden relative">
          {tabs.filter((t) => ['overview', 'closing', 'goals'].includes(t.key)).map((t) => {
            const Icon = t.icon;
            return (
              <button key={t.key} onClick={() => { setTab(t.key); setMobileMenuOpen(false); }}
                className={`flex flex-col items-center gap-0.5 px-1 py-2 text-xs border-b-2 ${tab === t.key ? 'border-indigo-600 text-indigo-600 font-medium' : 'border-transparent text-slate-500'}`}>
                <Icon className="w-4 h-4" /> {t.label}
              </button>
            );
          })}
          <button onClick={() => setMobileMenuOpen((open) => !open)}
            className={`flex flex-col items-center gap-0.5 px-1 py-2 text-xs border-b-2 ${['accounts', 'annual'].includes(tab) || mobileMenuOpen ? 'border-indigo-600 text-indigo-600 font-medium' : 'border-transparent text-slate-500'}`}>
            <MoreHorizontal className="w-4 h-4" />更多
          </button>
          {mobileMenuOpen && (
            <div className="absolute right-2 top-full mt-1 w-48 bg-white border border-slate-200 rounded-xl shadow-xl p-2 z-30">
              <button onClick={() => { setTab('accounts'); setMobileMenuOpen(false); }} className="w-full flex items-center gap-2 px-3 py-2 text-sm text-slate-600 rounded-lg hover:bg-slate-50"><ListChecks className="w-4 h-4" />账户管理</button>
              <button onClick={() => { setTab('annual'); setMobileMenuOpen(false); }} className="w-full flex items-center gap-2 px-3 py-2 text-sm text-slate-600 rounded-lg hover:bg-slate-50"><BarChart3 className="w-4 h-4" />年度小结</button>
              <div className="my-1 border-t border-slate-100" />
              <button onClick={() => { exportData(); setMobileMenuOpen(false); }} className="w-full flex items-center gap-2 px-3 py-2 text-sm text-slate-600 rounded-lg hover:bg-slate-50"><Upload className="w-4 h-4" />导出数据</button>
              <button onClick={() => { fileRef.current?.click(); setMobileMenuOpen(false); }} className="w-full flex items-center gap-2 px-3 py-2 text-sm text-slate-600 rounded-lg hover:bg-slate-50"><Download className="w-4 h-4" />导入数据</button>
              <button onClick={() => { setPasswordOpen(true); setMobileMenuOpen(false); }} className="w-full flex items-center gap-2 px-3 py-2 text-sm text-slate-600 rounded-lg hover:bg-slate-50"><Lock className="w-4 h-4" />修改密码</button>
              <button onClick={() => { setResetOpen(true); setMobileMenuOpen(false); }} className="w-full flex items-center gap-2 px-3 py-2 text-sm text-rose-600 rounded-lg hover:bg-rose-50"><Power className="w-4 h-4" />重置数据</button>
            </div>
          )}
        </div>
      </header>

      <main className="max-w-4xl mx-auto px-4 py-4 pb-16">
        {tab === 'overview' && (
          <Overview latest={latest} chartData={chartData} series={series} fire={fire} cashflow={cashflow}
            withdrawalRate={withdrawalRate} setWithdrawalRate={setWithdrawalRate}
            accounts={accounts} records={records} range={range} setRange={setRange} goals={goals} setTab={setTab}
            monthMeta={monthMeta} lastExportAt={lastExportAt} />
        )}
        {tab === 'accounts' && (
          <Accounts accounts={accounts} setAccounts={setAccounts} setRecords={setRecords}
            latest={latest} records={records} monthStatus={monthStatus} />
        )}
        {tab === 'closing' && (
          <Closing accounts={accounts} setAccounts={setAccounts} records={records} setRecords={setRecords}
            series={series} monthStatus={monthStatus} setMonthStatus={setMonthStatus} monthMeta={monthMeta} setMonthMeta={setMonthMeta}
            goals={goals} setGoalHistory={setGoalHistory} />
        )}
        {tab === 'goals' && <Goals goals={goals} setGoals={setGoals} goalHistory={goalHistory} setGoalHistory={setGoalHistory}
          accounts={accounts} records={records} latest={latest} />}
        {tab === 'annual' && <Annual annual={annual} />}
      </main>

      {resetOpen && (
        <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4">
          <div className="bg-white rounded-2xl p-5 max-w-sm w-full shadow-xl">
            <div className="flex items-center gap-2 mb-2">
              <AlertTriangle className="w-5 h-5 text-amber-600" />
              <h3 className="font-semibold">重置数据</h3>
            </div>
            <p className="text-sm text-slate-600 mb-4">这两个操作都会覆盖当前本机数据。执行前建议先「导出」备份一份 JSON。</p>
            <div className="space-y-2">
              <button onClick={restoreDemo} className="w-full text-sm bg-slate-100 hover:bg-slate-200 rounded-lg py-2.5">恢复为演示数据</button>
              <button onClick={clearAll} className="w-full text-sm bg-rose-600 hover:bg-rose-700 text-white rounded-lg py-2.5">清空全部，从零开始</button>
              <button onClick={() => setResetOpen(false)} className="w-full text-sm text-slate-500 hover:bg-slate-100 rounded-lg py-2.5">取消</button>
            </div>
          </div>
        </div>
      )}
      {passwordOpen && <PasswordModal onSave={(oldPassword, newPassword) => {
        const ok = onChangePassword(oldPassword, newPassword);
        if (ok) setPasswordOpen(false);
        return ok;
      }} onClose={() => setPasswordOpen(false)} />}
    </div>
  );
}

// ---------- 总览 ----------
function Overview({ latest, chartData, series, fire, cashflow, withdrawalRate, setWithdrawalRate, accounts, records, range, setRange, goals, setTab, monthMeta, lastExportAt }) {
  const [expandCat, setExpandCat] = useState(null);
  const [moreOpen, setMoreOpen] = useState(false);
  if (!latest) return <p className="text-slate-500">暂无数据，请到「账户管理」新增账户，并在「月度结账」结算新月份。</p>;

  const rec = records[latest.month] || {};

  const pieData = expandCat
    ? accounts.filter((a) => a.type === 'asset' && a.category === expandCat)
        .map((a) => ({ name: a.name, value: Number(rec[a.id]) || 0 }))
        .filter((x) => x.value > 0)
    : [
        { key: 'cash', name: CATS.cash, value: latest.cash },
        { key: 'investment', name: CATS.investment, value: latest.invest },
        { key: 'fixed', name: CATS.fixed, value: latest.fixed },
      ].filter((x) => x.value > 0);
  const pieTotal = pieData.reduce((s, x) => s + x.value, 0);

  const trend = chartData.map((s) => ({
    month: s.label, fullMonth: s.month,
    净资产: +(s.nw / 10000).toFixed(1), 负债: +(s.liab / 10000).toFixed(1),
    环比金额: s.netChange == null ? null : +(s.netChange / 10000).toFixed(1),
    环比比例: s.netChange == null || s.nw - s.netChange === 0 ? null : s.netChange / (s.nw - s.netChange),
  }));
  const cashTrend = chartData.map((s) => ({
    month: s.label,
    收入: +(s.inc / 10000).toFixed(1), 支出: +(s.exp / 10000).toFixed(1), 结余: +(s.saved / 10000).toFixed(1),
    收入金额: s.inc, 支出金额: s.exp, 结余金额: s.saved, 储蓄率: s.inc ? s.saved / s.inc : null,
  }));
  const cashTotals = chartData.reduce((sum, s) => ({ income: sum.income + s.inc, expense: sum.expense + s.exp, saved: sum.saved + s.saved }), { income: 0, expense: 0, saved: 0 });
  const cashMonthCount = chartData.length || 1;
  const periodSavingsRate = cashTotals.income ? cashTotals.saved / cashTotals.income : null;
  const growthTrend = chartData.map((s) => ({
    month: s.label, fullMonth: s.month,
    攒的: +(s.saved / 10000).toFixed(1), 非收支变化: +(s.nonCashChange / 10000).toFixed(1),
    结余金额: s.saved, 非收支变化金额: s.nonCashChange, drivers: s.drivers,
  }));
  const assetTrend = chartData.map((s) => {
    const total = s.cash + s.invest + s.fixed;
    return {
      month: s.label,
      现金: total ? s.cash / total : 0, 投资: total ? s.invest / total : 0, 固定资产: total ? s.fixed / total : 0,
      现金金额: s.cash, 投资金额: s.invest, 固定资产金额: s.fixed,
    };
  });
  const periodGrowth = chartData.length > 1 ? chartData[chartData.length - 1].nw - chartData[0].nw : 0;
  const previousMonth = chartData.length > 1 ? chartData[chartData.length - 2] : null;
  const recentMonths = chartData.slice(-12);
  const recentAvgExp = recentMonths.length ? recentMonths.reduce((sum, s) => sum + s.exp, 0) / recentMonths.length : 0;
  const cashBufferMonths = recentAvgExp > 0 ? latest.cash / recentAvgExp : null;
  const liabilityIncrease = previousMonth ? latest.liab - previousMonth.liab : 0;
  const attentionItems = [];
  if (latest.saved < 0) attentionItems.push({
    title: '先恢复正结余',
    detail: `本月支出比收入多 ${fmtWan(Math.abs(latest.saved))}，下月优先检查可调整支出。`,
    tone: 'rose',
  });
  if (latest.saved >= 0 && latest.netChange < 0) attentionItems.push({
    title: '核对净资产下滑',
    detail: `本月结余 ${fmtWan(latest.saved)}，但净资产仍下降 ${fmtWan(Math.abs(latest.netChange))}，可结合“非收支变化”检查原因。`,
    tone: 'amber',
  });
  if (cashBufferMonths != null && cashBufferMonths < 3) attentionItems.push({
    title: '关注现金缓冲',
    detail: `现金类资产按近 ${recentMonths.length} 个月平均支出可覆盖 ${cashBufferMonths.toFixed(1)} 个月，低于提示线 3 个月。`,
    tone: 'amber',
  });
  if (liabilityIncrease > 0) attentionItems.push({
    title: '确认新增负债',
    detail: `总负债较上月增加 ${fmtWan(liabilityIncrease)}，建议确认是否符合家庭原定安排。`,
    tone: 'rose',
  });
  if (latest.invest > 0 && latest.concentration > 0.5) attentionItems.push({
    title: '关注投资集中度',
    detail: `${latest.topInvName || '最大投资账户'}占投资资产 ${(latest.concentration * 100).toFixed(0)}%，高于提示线 50%。`,
    tone: 'amber',
  });
  const memberSummary = ['老公', '老婆', '共同'].map((member) => {
    const totals = { assets: 0, liabilities: 0, income: 0, expenses: 0 };
    accounts.filter((a) => a.member === member).forEach((a) => {
      let value = rec[a.id];
      if (value == null) value = a.type === 'expense' && a.isFixed && isActive(a) ? a.fixedAmount : 0;
      value = Number(value) || 0;
      if (a.type === 'asset') totals.assets += value;
      else if (a.type === 'liability') totals.liabilities += value;
      else if (a.type === 'income') totals.income += value;
      else if (a.type === 'expense') totals.expenses += value;
    });
    return { member, ...totals, netWorth: totals.assets - totals.liabilities };
  });
  const goalNow = new Date();
  const goalCurrentMonthIndex = goalNow.getFullYear() * 12 + goalNow.getMonth();
  const goalPriorityOrder = { high: 0, medium: 1, low: 2 };
  const goalPlans = goals
    .filter((goal) => goal && (Number(goal.targetAmount) || 0) > 0)
    .map((goal) => ({ ...goal, ...getGoalProgress(goal, goalCurrentMonthIndex, resolveGoalCurrentAmount(goal, rec)) }))
    .sort((a, b) => (goalPriorityOrder[a.priority] ?? 1) - (goalPriorityOrder[b.priority] ?? 1) || String(a.targetDate || '').localeCompare(String(b.targetDate || '')));
  const activeGoalPlans = goalPlans.filter((goal) => goal.gap > 0);
  const completedGoalCount = goalPlans.length - activeGoalPlans.length;
  const fundedGoalPlans = activeGoalPlans.filter((goal) => goal.priority !== 'low');
  const overdueGoalCount = fundedGoalPlans.filter((goal) => goal.monthlyNeed == null).length;
  const totalMonthlyNeed = fundedGoalPlans.reduce((sum, goal) => sum + (goal.monthlyNeed || 0), 0);
  const recentAvgSaved = recentMonths.length ? recentMonths.reduce((sum, item) => sum + item.saved, 0) / recentMonths.length : 0;
  const goalMonthlyBalance = recentAvgSaved - totalMonthlyNeed;
  const missingLatestAccounts = accounts.filter((account) => isActive(account) && (!Object.prototype.hasOwnProperty.call(rec, account.id) || rec[account.id] === '' || rec[account.id] == null));
  const balanceCheckMonths = chartData.slice(-3).map((item) => item.month);
  const unchangedBalanceAccounts = balanceCheckMonths.length === 3 ? accounts.filter((account) => isActive(account)
    && (account.type === 'liability' || (account.type === 'asset' && account.category !== 'fixed'))
    && balanceCheckMonths.every((month) => Object.prototype.hasOwnProperty.call(records[month] || {}, account.id)
      && records[month][account.id] !== '' && records[month][account.id] != null)
    && balanceCheckMonths.every((month) => Number(records[month][account.id]) === Number(records[balanceCheckMonths[0]][account.id]))) : [];
  const unannotatedLargeDrivers = latest.drivers.filter((driver) => Math.abs(driver.contribution) >= 10000 && !driver.reason);
  const linkedAccountUsage = {};
  goals.forEach((goal) => (Array.isArray(goal.linkedAccountIds) ? goal.linkedAccountIds : []).forEach((accountId) => { linkedAccountUsage[accountId] = (linkedAccountUsage[accountId] || 0) + 1; }));
  const duplicateGoalAccounts = Object.keys(linkedAccountUsage).filter((accountId) => linkedAccountUsage[accountId] > 1);
  const accountIds = new Set(accounts.map((account) => account.id));
  const missingGoalAccounts = Object.keys(linkedAccountUsage).filter((accountId) => !accountIds.has(accountId));
  const exportDate = lastExportAt ? new Date(lastExportAt) : null;
  const exportDaysAgo = exportDate && !Number.isNaN(exportDate.getTime()) ? Math.floor((Date.now() - exportDate.getTime()) / 86400000) : null;
  const trustItems = [];
  if (missingLatestAccounts.length > 0) trustItems.push({ title: '启用账户未填写', detail: `${missingLatestAccounts.length} 个账户在 ${latest.month} 没有完整数值。`, tone: 'rose' });
  if (unannotatedLargeDrivers.length > 0) trustItems.push({ title: '大额变化未标注', detail: `${unannotatedLargeDrivers.length} 个账户变化超过 1 万元但尚未填写原因。`, tone: 'amber' });
  if (Math.abs(latest.nonCashChange) > Math.abs(latest.saved) && Math.abs(latest.nonCashChange) >= 10000) trustItems.push({ title: '非收支变化较大', detail: `非收支变化 ${yuanSign(latest.nonCashChange)}，绝对值超过本月结余。`, tone: 'amber' });
  if (unchangedBalanceAccounts.length > 0) trustItems.push({ title: '余额连续三个月不变', detail: `${unchangedBalanceAccounts.length} 个现金、投资或负债账户连续三个月相同，请确认不是忘记更新。`, tone: 'slate' });
  if (monthMeta[latest.month]?.reopenedAt) trustItems.push({ title: '已结账月份重新编辑过', detail: `${latest.month} 曾在结账后重新打开，请确认修正结果。`, tone: 'amber' });
  if (duplicateGoalAccounts.length > 0) trustItems.push({ title: '目标资金重复计算', detail: `${duplicateGoalAccounts.length} 个资产账户同时关联多个目标。`, tone: 'rose' });
  if (missingGoalAccounts.length > 0) trustItems.push({ title: '目标关联账户已不存在', detail: `${missingGoalAccounts.length} 个目标资金账户无法在账户管理中找到。`, tone: 'rose' });
  if (exportDaysAgo == null) trustItems.push({ title: '尚无导出备份记录', detail: '建议完成首次数据导出，并将 JSON 保存在其他位置。', tone: 'slate' });
  else if (exportDaysAgo > 30) trustItems.push({ title: '备份超过 30 天', detail: `距离上次导出已经 ${exportDaysAgo} 天。`, tone: 'amber' });
  const actionReviews = [];
  series.forEach((before, index) => {
    const next = series[index + 1];
    const actions = Array.isArray(monthMeta[before.month]?.actions) ? monthMeta[before.month].actions : [];
    actions.forEach((action) => actionReviews.push({
      ...action,
      month: before.month,
      result: actionMetricChange(action.metric, before, next),
    }));
  });
  const completedActions = actionReviews.filter((action) => action.done === true);
  const overdueActions = actionReviews.filter((action) => action.month < latest.month && action.done !== true);

  const rateHint = withdrawalRate <= 4 ? '较稳健' : withdrawalRate <= 5 ? '中性偏乐观' : '偏激进，依赖市场表现与灵活开支';
  const yearsText = fire.years == null ? '按当前储蓄速度暂难达成' : fire.years === 0 ? '已达成 🎉' : `约 ${fire.years.toFixed(1)} 年可达成`;
  const projectFireScenario = (annualReturn, annualExpenseGrowth) => {
    const rate = withdrawalRate / 100;
    if (!(rate > 0)) return null;
    let balance = Math.max(0, fire.invest);
    let annualExpense = Math.max(0, fire.annualExp);
    const monthlySaving = fire.annualSaved / 12;
    const monthlyReturn = Math.pow(1 + annualReturn, 1 / 12) - 1;
    const monthlyExpenseGrowth = Math.pow(1 + annualExpenseGrowth, 1 / 12) - 1;
    if (balance >= annualExpense / rate) return { months: 0 };
    for (let months = 1; months <= 80 * 12; months += 1) {
      balance = Math.max(0, balance * (1 + monthlyReturn) + monthlySaving);
      annualExpense *= 1 + monthlyExpenseGrowth;
      if (balance >= annualExpense / rate) {
        return { months };
      }
    }
    return null;
  };
  const fireScenarios = [
    { name: '保守', annualReturn: 0.02, expenseGrowth: 0.03, tone: 'border-slate-200 bg-slate-50' },
    { name: '基准', annualReturn: 0.04, expenseGrowth: 0.02, tone: 'border-indigo-200 bg-indigo-50' },
    { name: '乐观', annualReturn: 0.06, expenseGrowth: 0.02, tone: 'border-emerald-200 bg-emerald-50' },
  ].map((scenario) => ({ ...scenario, result: projectFireScenario(scenario.annualReturn, scenario.expenseGrowth) }));

  return (
    <div className="space-y-4">
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
        <StatCard icon={Wallet} label="净资产" value={fmtWan(latest.nw)} tone="indigo"
          sub={latest.netChange != null ? `本月 ${wanSign(latest.netChange)}` : ''} />
        <StatCard icon={PiggyBank} label="本月攒的" value={fmtWan(latest.saved)} tone="amber" sub={`收入 ${fmtWan(latest.inc)} · 支出 ${fmtWan(latest.exp)}`} />
        <StatCard icon={TrendingUp} label="总资产" value={fmtWan(latest.assets)} tone="emerald" sub={`投资 ${fmtWan(latest.invest)}`} />
        <StatCard icon={Target} label="总负债" value={fmtWan(latest.liab)} tone="rose" />
      </div>

      <div className="bg-white rounded-xl p-4 border border-slate-200">
        <div className="flex items-center gap-2 font-semibold mb-2">
          <Target className="w-5 h-5 text-indigo-600" />家庭目标与现金流
          {goalPlans.length > 0 && <span className="ml-auto text-xs text-slate-400">{completedGoalCount} 个已完成 · {activeGoalPlans.length} 个进行中</span>}
        </div>
        {goalPlans.length === 0 ? (
          <div className="flex flex-col sm:flex-row sm:items-center gap-3">
            <p className="text-sm text-slate-500 flex-1">尚未设置家庭目标，暂时无法判断当前结余能否支撑想要的生活计划。</p>
            <button onClick={() => setTab('goals')} className="shrink-0 text-sm px-3 py-2 rounded-lg bg-indigo-50 text-indigo-600 hover:bg-indigo-100">去设置目标</button>
          </div>
        ) : (
          <>
            <div className="grid grid-cols-3 gap-2 text-center mb-3">
              <MiniStat label={`近 ${recentMonths.length} 月平均结余`} value={fmtWan(recentAvgSaved)} c={recentAvgSaved >= 0 ? 'text-emerald-600' : 'text-rose-600'} />
              <MiniStat label="优先目标每月需准备" value={fmtWan(totalMonthlyNeed)} c="text-indigo-600" />
              <MiniStat label={overdueGoalCount > 0 ? '当前状态' : goalMonthlyBalance >= 0 ? '每月可剩余' : '每月资金缺口'}
                value={overdueGoalCount > 0 ? `${overdueGoalCount} 个已到期` : fmtWan(Math.abs(goalMonthlyBalance))}
                c={overdueGoalCount > 0 || goalMonthlyBalance < 0 ? 'text-rose-600' : 'text-emerald-600'} />
            </div>
            {activeGoalPlans.length > 0 ? <div className="space-y-2">
              {activeGoalPlans.slice(0, 3).map((goal) => (
                <div key={goal.id} className="rounded-lg border border-slate-100 bg-slate-50 p-3">
                  <div className="flex items-center justify-between gap-3 text-sm"><span className="font-medium text-slate-700 truncate">{goal.name}</span><span className="text-slate-500 shrink-0">{(goal.progress * 100).toFixed(1)}%</span></div>
                  <div className="h-1.5 bg-slate-200 rounded-full overflow-hidden mt-1.5"><div className="h-full bg-indigo-600 rounded-full" style={{ width: `${Math.min(100, goal.progress * 100)}%` }} /></div>
                  <div className="flex flex-wrap justify-between gap-1 text-xs text-slate-400 mt-1.5"><span>还差 {fmtWan(goal.gap)} · 目标 {goal.targetDate}</span><span className={goal.monthlyNeed == null ? 'text-rose-600' : 'text-indigo-600'}>{goal.monthlyNeed == null ? '已到期' : `每月需 ${fmtWan(goal.monthlyNeed)}`}</span></div>
                </div>
              ))}
              {activeGoalPlans.length > 3 && <p className="text-xs text-slate-400">另有 {activeGoalPlans.length - 3} 个进行中的目标，请到「家庭目标」查看。</p>}
            </div> : <p className="text-sm text-emerald-600">所有家庭目标均已完成。</p>}
            <div className="flex items-start justify-between gap-3 mt-2">
              <p className="text-xs text-slate-400">仅汇总“优先”和“正常”目标，按同时推进计算；平均结余取最近 12 个月，不计目标资金未来收益。</p>
              <button onClick={() => setTab('goals')} className="shrink-0 text-xs text-indigo-600">管理目标</button>
            </div>
          </>
        )}

      <div className={`${trustItems.length > 0 ? 'p-4' : 'px-4 py-3'} bg-white rounded-xl border border-slate-200`}>

          {attentionItems.length > 0
            ? <AlertTriangle className="w-5 h-5 text-amber-600" />

            {attentionItems.length > 0 ? `${attentionItems.length} 项` : '状态平稳'}

        </div>
        {attentionItems.length > 0 ? (

            </div>

        </div> : null}
        {trustItems.length > 0 && <p className="text-xs text-slate-400 mt-2">这里只列出可核对事实，不对家庭财务质量打分。</p>}
      </div>

      <div className="bg-white rounded-xl p-4 border border-slate-200">
        <div className="flex items-center justify-between mb-2">
          <div className="flex items-center gap-2 font-semibold"><Target className="w-5 h-5 text-indigo-600" />财务自由进度</div>
          <span className="text-2xl font-bold text-indigo-600">{(fire.progress * 100).toFixed(1)}%</span>
        </div>
        <div className="w-full bg-slate-100 rounded-full h-3 overflow-hidden">
          <div className="bg-indigo-600 h-3 rounded-full" style={{ width: `${Math.min(100, fire.progress * 100)}%` }} />
        </div>
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-2 mt-3 text-center">
          <MiniStat label="还差投资本金" value={fmtWan(fire.remaining)} c={fire.remaining > 0 ? 'text-indigo-600' : 'text-emerald-600'} />

          <MiniStat label="每年可覆盖支出" value={`${fire.coverageMonths.toFixed(1)}个月`} c="text-sky-600" />
          <MiniStat label="预计还需时间" value={fire.years === 0 ? '已达成' : fire.years == null ? '暂无法估算' : `约 ${fire.years.toFixed(1)} 年`} c={fire.years == null ? 'text-slate-500' : 'text-indigo-600'} />
        </div>
        <div className="mt-3 text-xs text-slate-500 space-y-1">
          <p>投资本金 {fmtWan(latest.invest)} × 提取率 {withdrawalRate}% = 年被动收入 {fmtWan(fire.passive)}</p>

        <div className="flex items-center gap-2 mt-3">
          <span className="text-xs text-slate-500">提取率</span>
          <input type="range" min="3" max="6" step="0.5" value={withdrawalRate}

        </div>
        <p className="text-xs text-slate-400 mt-1">当前提取率{rateHint}。提取率越高，进度越好看，但长期可持续性越低。</p>
        {moreOpen && <div className="mt-4 pt-3 border-t border-slate-100">
          <div className="text-sm font-medium text-slate-700 mb-2">情景推演 · 复利与支出增长</div>
          <div className="grid sm:grid-cols-3 gap-2">
            {fireScenarios.map((scenario) => (
              <div key={scenario.name} className={`rounded-lg border p-3 ${scenario.tone}`}>
                <div className="flex items-center justify-between"><span className="text-sm font-medium text-slate-700">{scenario.name}</span><span className="text-xs text-slate-500">收益 {(scenario.annualReturn * 100).toFixed(0)}%</span></div>
                <div className="text-lg font-bold text-indigo-600 mt-1">{scenario.result ? scenario.result.months === 0 ? '已覆盖目标' : `约 ${(scenario.result.months / 12).toFixed(1)} 年` : '暂无法达成'}</div>
                <p className="text-xs text-slate-500 mt-1">{scenario.result ? '按当前月结余持续投入' : '80 年内未达到'} · 支出年增 {(scenario.expenseGrowth * 100).toFixed(0)}%</p>
              </div>
            ))}
          </div>
          <p className="text-xs text-slate-400 mt-2">以上仅用于观察假设变化的影响：按当前月结余持续投入、收益按月复利、生活支出持续增长；未计税费、投资波动和家庭计划变化，不是收益承诺。</p>
        </div>}
      </div>

      <button onClick={() => setMoreOpen((v) => !v)}
        className="w-full bg-white rounded-xl px-4 py-3 border border-slate-200 flex items-center justify-between text-sm font-semibold text-slate-700">
        <span>{moreOpen ? '收起深度分析' : '展开深度分析'}</span>
        <ChevronDown className={`w-4 h-4 text-slate-400 transition-transform ${moreOpen ? 'rotate-180' : ''}`} />
      </button>

      {moreOpen && (
        <div className="space-y-4">
          <div className={`rounded-xl p-4 border ${cashflow.disposable < 0 ? 'bg-rose-50 border-rose-200' : 'bg-white border-slate-200'}`}>
            <div className="flex items-center gap-2 font-semibold mb-3">
              <CalendarClock className="w-5 h-5 text-indigo-600" />固定支出覆盖预估
              {cashflow.disposable < 0 && (
                <span className="flex items-center gap-1 text-xs text-rose-600 ml-auto"><AlertTriangle className="w-4 h-4" />预计收入不足以覆盖固定支出</span>
              )}
            </div>
            <div className="grid grid-cols-3 gap-2 text-center">
              <div><div className="text-xs text-slate-500">近3月平均收入</div><div className="font-bold text-emerald-600">{fmtWan(cashflow.predIncome)}</div></div>
              <div><div className="text-xs text-slate-500">固定支出</div><div className="font-bold text-slate-700">{fmtWan(cashflow.fixedExp)}</div></div>
              <div><div className="text-xs text-slate-500">固定支出后余额</div><div className={`font-bold ${cashflow.disposable < 0 ? 'text-rose-600' : 'text-indigo-600'}`}>{fmtWan(cashflow.disposable)}</div></div>
            </div>
            <p className="text-xs text-slate-400 mt-2">这里只衡量固定支出覆盖能力，不含日常开销等浮动支出，也不计入净资产。</p>
          </div>
          <div className="bg-white rounded-xl p-4 border border-slate-200">
        <div className="flex items-center gap-2 font-semibold mb-1">
          {expandCat && (
            <button onClick={() => setExpandCat(null)} className="flex items-center text-indigo-600 text-sm"><ChevronLeft className="w-4 h-4" />返回</button>
          )}
          <span>资产占比{expandCat ? ` · ${CATS[expandCat]}` : '（按大类）'}</span>
        </div>
        {!expandCat && <p className="text-xs text-slate-400 mb-1">点击扇区可展开查看该类下的账户</p>}
        <div className="h-56">
          <ResponsiveContainer width="100%" height="100%">
            <PieChart>
              <Pie data={pieData} dataKey="value" nameKey="name" cx="50%" cy="50%" outerRadius={78}
                label={({ percent }) => (percent > 0.05 ? `${(percent * 100).toFixed(0)}%` : '')} labelLine={false}
                onClick={(d) => { if (!expandCat && d && d.payload.key) setExpandCat(d.payload.key); }}>
                {pieData.map((_, i) => <Cell key={i} fill={COLORS[i % COLORS.length]} cursor={expandCat ? 'default' : 'pointer'} />)}
              </Pie>
              <Tooltip formatter={(v) => fmtYuan(v)} />
            </PieChart>
          </ResponsiveContainer>
        </div>
        <div className="flex flex-wrap gap-x-4 gap-y-1 justify-center mt-1">
          {pieData.map((d, i) => (
            <div key={i} className="flex items-center gap-1.5 text-xs">
              <span className="w-2.5 h-2.5 rounded-sm" style={{ background: COLORS[i % COLORS.length] }} />
              <span className="text-slate-600">{d.name}</span>
              <span className="text-slate-400">{fmtYuan(d.value)} · {pieTotal ? (d.value / pieTotal * 100).toFixed(1) : 0}%</span>
            </div>
          ))}

      <div className="flex items-center justify-between">
        <span className="text-sm text-slate-500">图表范围</span>
        <div className="flex gap-1 bg-white rounded-lg p-1 border border-slate-200">
          {[{ k: '1y', l: '近一年' }, { k: 'all', l: '全部' }].map((r) => (
            <button key={r.k} onClick={() => setRange(r.k)}
              className={`px-3 py-1.5 rounded-md text-xs font-medium ${range === r.k ? 'bg-indigo-600 text-white' : 'text-slate-600 hover:bg-slate-100'}`}>{r.l}</button>

            区间 {wanSign(periodGrowth)}
