            <div className="text-sm font-medium text-slate-700 mb-1">{latest.month} 变化解释</div>
            <p className="text-sm text-slate-600">
              净资产变化 <span className="font-medium text-indigo-600">{yuanSign(latest.netChange)}</span>
              {' = '}结余 <span className="text-emerald-600">{yuanSign(latest.saved)}</span>
              {' + '}非收支变化 <span className={latest.nonCashChange >= 0 ? 'text-amber-600' : 'text-rose-600'}>{yuanSign(latest.nonCashChange)}</span>
            </p>
            {latest.drivers.length > 0 && (
              <div className="mt-2 flex flex-wrap gap-2">
                {latest.drivers.slice(0, 3).map((d) => (
                  <span key={d.accountId} className="text-xs bg-slate-50 border border-slate-200 rounded-full px-2 py-1 text-slate-600">{d.name} {yuanSign(d.contribution)}{d.reason ? ` · ${d.reason}` : ''}</span>
                ))}
              </div>
            )}
            <p className="text-xs text-slate-400 mt-2">主要变化账户按对净资产的影响排序；负债减少记为正贡献，负债增加记为负贡献。</p>
          </div>
        )}
      </div>

        </div>
      )}

      {moreOpen && (
        <div className="space-y-4">
          <div className="bg-white rounded-xl p-4 border border-slate-200">
            <div className="font-semibold mb-1">行动复盘</div>
            <p className="text-xs text-slate-400 mb-3">完成状态来自手工勾选；关联指标仅展示同期结果，不判断行动是否导致了变化。</p>
            {actionReviews.length === 0 ? <p className="text-sm text-slate-400">暂无行动历史，请先在月度结账中记录下月行动。</p> : <>
              <div className="grid grid-cols-3 gap-2 text-center mb-3">
                <MiniStat label="已记录行动" value={`${actionReviews.length} 项`} c="text-slate-700" />
                <MiniStat label="行动完成率" value={`${(completedActions.length / actionReviews.length * 100).toFixed(0)}%`} c="text-indigo-600" />
                <MiniStat label="逾期未完成" value={`${overdueActions.length} 项`} c={overdueActions.length ? 'text-rose-600' : 'text-emerald-600'} />
              </div>
              <div className="space-y-2">
                {actionReviews.slice(-5).reverse().map((action) => (
                  <div key={`${action.month}-${action.id}`} className="flex items-start gap-2 text-xs rounded-lg bg-slate-50 border border-slate-100 p-2.5">
                    <span className={action.done ? 'text-emerald-600' : 'text-amber-600'}>{action.done ? '已完成' : '待完成'}</span>
                    <span className="flex-1 text-slate-600">{action.month} · {action.text}</span>
                    {action.result != null && <span className="text-slate-500">同期结果 · {ACTION_METRICS[action.metric]} {yuanSign(action.result)}</span>}
                  </div>
                ))}
              </div>
            </>}
          </div>

          <div className="bg-white rounded-xl p-4 border border-slate-200">
            <div className="font-semibold mb-1">成员归属摘要 · {latest.month}</div>
            <p className="text-xs text-slate-400 mb-3">按账户管理中的成员归属汇总最新月份数据</p>
            <div className="grid sm:grid-cols-3 gap-3">
              {memberSummary.map((summary) => (
                <div key={summary.member} className="rounded-lg border border-slate-200 bg-slate-50 p-3">
                  <div className="font-medium text-slate-700 mb-2">{summary.member}</div>
                  <div className="grid grid-cols-2 gap-x-3 gap-y-2 text-xs">
                    <div><div className="text-slate-400">净资产</div><div className="font-medium text-indigo-600">{fmtWan(summary.netWorth)}</div></div>
                    <div><div className="text-slate-400">总负债</div><div className="font-medium text-rose-600">{fmtWan(summary.liabilities)}</div></div>
                    <div><div className="text-slate-400">本月收入</div><div className="font-medium text-emerald-600">{fmtWan(summary.income)}</div></div>
                    <div><div className="text-slate-400">本月支出</div><div className="font-medium text-amber-600">{fmtWan(summary.expenses)}</div></div>
                  </div>
                </div>
              ))}
            </div>
            <p className="text-xs text-slate-400 mt-2">仅用于核对账户归属；共同支出不会拆分到夫妻名下，不代表个人贡献或实际分摊。</p>
          </div>

          <div className="bg-white rounded-xl p-4 border border-slate-200">
            <div className="font-semibold mb-1">资产结构变化</div>
            <p className="text-xs text-slate-400 mb-2">现金、投资与固定资产占资产总额的比例</p>
            {assetTrend.length < 6 ? (
              <div className="h-32 flex items-center justify-center text-sm text-slate-400">至少需要6个月数据才能观察结构趋势</div>
            ) : (
              <div className="h-56">
                <ResponsiveContainer width="100%" height="100%">
                  <AreaChart data={assetTrend}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#eee" />
                    <XAxis dataKey="month" tick={{ fontSize: 11 }} interval="preserveStartEnd" />
                    <YAxis tick={{ fontSize: 11 }} width={42} domain={[0, 1]} tickFormatter={(v) => (v * 100).toFixed(0) + '%'} />
                    <Tooltip content={<AssetStructureTooltip />} />
                    <Legend wrapperStyle={{ fontSize: 12 }} />
                    <Area type="monotone" dataKey="现金" stackId="asset" stroke="#06b6d4" fill="#06b6d4" />
                    <Area type="monotone" dataKey="投资" stackId="asset" stroke="#6366f1" fill="#6366f1" />
                    <Area type="monotone" dataKey="固定资产" stackId="asset" stroke="#f59e0b" fill="#f59e0b" />
                  </AreaChart>
                </ResponsiveContainer>
              </div>
            )}
          </div>

        </div>
      )}
    </div>
  );
}

function ChartTooltipBox({ title, rows }) {
  return (
    <div className="bg-white/95 border border-slate-200 rounded-lg shadow-lg px-3 py-2 text-xs">
      <div className="font-medium text-slate-700 mb-1">{title}</div>
      <div className="space-y-1">
        {rows.map((row, i) => <div key={`${row.label}-${i}`} className="flex items-center justify-between gap-4">
          <span className="text-slate-500">{row.label}</span><span className={row.className || 'text-slate-700'}>{row.value}</span>
        </div>)}
      </div>
    </div>
  );
}

function NetWorthTooltip({ active, payload, label }) {
  if (!active || !payload?.length) return null;
  const d = payload[0].payload;
  return <ChartTooltipBox title={d.fullMonth || label} rows={[
    { label: '净资产', value: d.净资产 + '万', className: 'font-medium text-indigo-600' },
    { label: '总负债', value: d.负债 + '万', className: 'text-rose-600' },
    { label: '环比变化', value: d.环比金额 == null ? '—' : `${d.环比金额 >= 0 ? '+' : ''}${d.环比金额}万` },
    { label: '环比比例', value: d.环比比例 == null ? '—' : pctSign(d.环比比例) },
  ]} />;
}

function CashflowTooltip({ active, payload, label }) {
  if (!active || !payload?.length) return null;
  const d = payload[0].payload;
  return <ChartTooltipBox title={label} rows={[
    { label: '收入', value: fmtYuan(d.收入金额), className: 'text-emerald-600' },
    { label: '支出', value: fmtYuan(d.支出金额), className: 'text-amber-600' },
    { label: '结余', value: fmtYuan(d.结余金额), className: d.结余金额 >= 0 ? 'text-indigo-600' : 'text-rose-600' },
    { label: '储蓄率', value: d.储蓄率 == null ? '收入为0，无法计算' : (d.储蓄率 * 100).toFixed(1) + '%', className: 'font-medium text-indigo-600' },
  ]} />;
}

function GrowthTooltip({ active, payload, label }) {
  if (!active || !payload?.length) return null;
  const d = payload[0].payload;
  const driverRows = (d.drivers || []).slice(0, 3).map((driver) => ({
    label: driver.reason ? `${driver.name} · ${driver.reason}` : driver.name,
    value: yuanSign(driver.contribution),
    className: driver.contribution >= 0 ? 'text-emerald-600' : 'text-rose-600',
  }));
  return <ChartTooltipBox title={d.fullMonth || label} rows={[
    { label: '结余', value: yuanSign(d.结余金额), className: 'text-emerald-600' },
    { label: '非收支变化', value: yuanSign(d.非收支变化金额), className: d.非收支变化金额 >= 0 ? 'text-amber-600' : 'text-rose-600' },
    ...driverRows,
  ]} />;
}

function AssetStructureTooltip({ active, payload, label }) {
  if (!active || !payload?.length) return null;
  const d = payload[0].payload;
  return <ChartTooltipBox title={label} rows={[
    { label: '现金', value: `${(d.现金 * 100).toFixed(1)}% · ${fmtWan(d.现金金额)}` },
    { label: '投资', value: `${(d.投资 * 100).toFixed(1)}% · ${fmtWan(d.投资金额)}` },
    { label: '固定资产', value: `${(d.固定资产 * 100).toFixed(1)}% · ${fmtWan(d.固定资产金额)}` },
  ]} />;
}

function StatCard({ icon: Icon, label, value, sub, tone }) {
  const tones = {
    indigo: 'text-indigo-600 bg-indigo-50', emerald: 'text-emerald-600 bg-emerald-50',
    amber: 'text-amber-600 bg-amber-50', rose: 'text-rose-600 bg-rose-50',
    violet: 'text-violet-600 bg-violet-50', sky: 'text-sky-600 bg-sky-50',
  };
  return (
    <div className="bg-white rounded-xl p-3 border border-slate-200">
      <div className={`inline-flex p-1.5 rounded-lg mb-1 ${tones[tone]}`}><Icon className="w-4 h-4" /></div>
      <div className="text-xs text-slate-500 truncate">{label}</div>
      <div className="text-lg font-bold">{value}</div>
      {sub && <div className="text-xs text-slate-400 mt-0.5">{sub}</div>}
    </div>
  );
}

// ---------- 账户管理 ----------
function Accounts({ accounts, setAccounts, setRecords, latest, records, monthStatus }) {
  const [modal, setModal] = useState(null);
  const [confirm, setConfirm] = useState(null);
  const [showInactive, setShowInactive] = useState(false);

  const inactive = accounts.filter((a) => !isActive(a));

  const remove = (id) => {
    setAccounts((prev) => prev.filter((a) => a.id !== id));
    setRecords((prev) => {
      const copy = { ...prev };
      Object.keys(copy).forEach((m) => { const r = { ...copy[m] }; delete r[id]; copy[m] = r; });
      return copy;
    });
    setConfirm(null);
  };
  const setActiveState = (id, val) => {
    setAccounts((prev) => prev.map((a) => (a.id === id ? { ...a, active: val } : a)));
    setConfirm(null);
  };

  const save = (acc) => {
    setAccounts((prev) => {
      const exists = prev.find((a) => a.id === acc.id);
      return exists ? prev.map((a) => (a.id === acc.id ? acc : a)) : [...prev, acc];
    });
    if (acc.type === 'expense' && acc.isFixed && latest?.month && monthStatus[latest.month] !== 'closed') {
      setRecords((prev) => ({
        ...prev,
        [latest.month]: { ...prev[latest.month], [acc.id]: Number(acc.fixedAmount) || 0 },
      }));
    }
    setModal(null);
  };

  const sections = [
    { type: 'asset', title: '资产账户', hint: '填月末余额' },
    { type: 'liability', title: '负债账户', hint: '填月末余额' },
    { type: 'income', title: '收入账户', hint: '填当月发生额' },
    { type: 'expense', title: '支出账户', hint: '固定支出填月供，浮动按月填' },
  ];

  const typeLabel = { asset: '资产', liability: '负债', income: '收入', expense: '支出' };

  return (
    <div className="space-y-4">
      {sections.map((sec) => {
        const rows = accounts.filter((a) => a.type === sec.type && isActive(a));
        return (
          <div key={sec.type} className="bg-white rounded-xl p-4 border border-slate-200">
            <div className="flex items-center justify-between mb-2">
              <div>
                <span className="font-semibold">{sec.title}</span>
                <span className="text-xs text-slate-400 ml-2">{sec.hint}</span>
              </div>
              <button onClick={() => setModal({ id: '', name: '', type: sec.type, category: 'cash', isFixed: false, fixedAmount: 0, member: '共同', active: true })}
                className="flex items-center gap-1 text-xs text-indigo-600">
                <PlusCircle className="w-4 h-4" />新增
              </button>
            </div>
            <div className="divide-y divide-slate-100">
              {rows.map((a) => (
                <div key={a.id} className="flex items-center justify-between py-2">
                  <div className="min-w-0">
                    <div className="font-medium text-sm truncate">{a.name}
                      {a.type === 'asset' && <span className="ml-2 text-xs text-slate-400">{CATS[a.category]}</span>}
                      {a.type === 'expense' && a.isFixed && <span className="ml-2 text-xs px-1.5 py-0.5 rounded bg-amber-100 text-amber-700">固定 {a.fixedAmount}/月</span>}
                    </div>
                    <div className="text-xs text-slate-400">{a.member}</div>
                  </div>
                  <div className="flex items-center gap-2">
                    <button onClick={() => setModal(a)} className="text-slate-400 hover:text-indigo-600" title="编辑"><Pencil className="w-4 h-4" /></button>
                    <button onClick={() => setConfirm({ mode: 'deactivate', account: a })} className="text-emerald-500 hover:text-emerald-600" title="停用"><Power className="w-4 h-4" /></button>
                    <button onClick={() => setConfirm({ mode: 'delete', account: a })} className="text-slate-400 hover:text-rose-600" title="删除"><Trash2 className="w-4 h-4" /></button>
                  </div>
                </div>
              ))}
              {rows.length === 0 && <p className="text-xs text-slate-400 py-2">暂无，点右上角新增</p>}
            </div>
          </div>
        );
      })}

      {inactive.length > 0 && (
        <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
          <button onClick={() => setShowInactive((v) => !v)} className="w-full flex items-center justify-between px-4 py-3">
            <span className="font-semibold text-slate-600 flex items-center gap-2">
              <Power className="w-4 h-4 text-slate-400" />已停用 ({inactive.length})
            </span>
            <ChevronDown className={`w-4 h-4 text-slate-400 transition-transform ${showInactive ? 'rotate-180' : ''}`} />
          </button>
          {showInactive && (
            <div className="px-4 pb-3 divide-y divide-slate-100">
              {inactive.map((a) => (
                <div key={a.id} className="flex items-center justify-between py-2 opacity-70">
                  <div className="min-w-0">
                    <div className="font-medium text-sm truncate">{a.name}
                      <span className="ml-2 text-xs text-slate-400">{typeLabel[a.type]}{a.type === 'asset' ? ` · ${CATS[a.category]}` : ''}</span>
                    </div>
                    <div className="text-xs text-slate-400">{a.member}</div>
                  </div>
                  <div className="flex items-center gap-2">
                    <button onClick={() => setActiveState(a.id, true)} className="text-xs text-indigo-600 hover:underline">重新启用</button>
                    <button onClick={() => setConfirm({ mode: 'delete', account: a })} className="text-slate-400 hover:text-rose-600" title="删除"><Trash2 className="w-4 h-4" /></button>
                  </div>
                </div>
              ))}
              <p className="text-xs text-slate-400 pt-2">停用账户的历史数据仍完整参与净资产与年度小结计算，只是不出现在结账录入和当前余额中。</p>
            </div>
          )}
        </div>
      )}

      {modal && <AccountModal account={modal} onSave={save} onClose={() => setModal(null)} />}
      {confirm && (
        <ConfirmModal confirm={confirm} records={records} latest={latest}
          onCancel={() => setConfirm(null)}
          onDeactivate={() => setActiveState(confirm.account.id, false)}
          onDelete={() => remove(confirm.account.id)} />
      )}
    </div>
  );
}

function ConfirmModal({ confirm, records, latest, onCancel, onDeactivate, onDelete }) {
  const { mode, account } = confirm;
  const id = account.id;
  let monthCount = 0;
  Object.keys(records).forEach((m) => { if ((Number(records[m][id]) || 0) !== 0) monthCount++; });
  const curVal = (records[latest?.month] || {})[id];

  const isDeactivate = mode === 'deactivate';
  return (
    <div className="fixed inset-0 bg-black/40 z-40 flex items-center justify-center p-4">
      <div className="bg-white rounded-2xl p-5 max-w-sm w-full shadow-xl">
        <div className="flex items-center gap-2 mb-2">
          {isDeactivate
            ? <Power className="w-5 h-5 text-emerald-600" />
            : <AlertTriangle className="w-5 h-5 text-rose-600" />}
          <h3 className="font-semibold">{isDeactivate ? '停用账户' : '删除账户'}</h3>
        </div>
        {isDeactivate ? (
          <div className="text-sm text-slate-600 space-y-2 mb-4">
            <p>确定停用「<span className="font-medium">{account.name}</span>」吗？</p>
            <p className="bg-emerald-50 text-emerald-700 rounded-lg p-2.5 text-xs">
              历史数据将<b>完整保留</b>，过往月份的净资产、年度小结、趋势图均<b>不受影响</b>。停用后它不再出现在月度结账录入和当前余额里，<b>可随时重新启用</b>。
            </p>
            {curVal != null && curVal !== 0 && (
              <p className="text-xs text-amber-600">提示：该账户当月余额为 {fmtYuan(curVal)}，停用前请确认是否已清零/转出。</p>
            )}
          </div>
        ) : (
          <div className="text-sm text-slate-600 space-y-2 mb-4">
            <p>确定删除「<span className="font-medium">{account.name}</span>」吗？</p>
            <p className="bg-rose-50 text-rose-700 rounded-lg p-2.5 text-xs">
              该账户目前涉及 <b>{monthCount}</b> 个月的记录，删除会<b>清空它在所有月份的历史数据</b>，过往的总资产、净资产、趋势线与年度小结都会随之改变，且<b>无法恢复</b>。
            </p>
            <p className="text-xs text-slate-400">若只是「现在没有了」但想保留历史，建议改用「停用」。</p>
          </div>
        )}
        <div className="flex gap-2 justify-end">
          <button onClick={onCancel} className="px-4 py-2 text-sm text-slate-600 hover:bg-slate-100 rounded-lg">取消</button>
          {isDeactivate ? (
            <button onClick={onDeactivate} className="px-4 py-2 text-sm bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg">确认停用</button>
          ) : (
            <button onClick={onDelete} className="px-4 py-2 text-sm bg-rose-600 hover:bg-rose-700 text-white rounded-lg">确认删除</button>
          )}
        </div>
      </div>
    </div>
  );
}

function MiniStat({ label, value, c }) {
  return (
    <div className="bg-slate-50 rounded-lg py-2">
      <div className="text-xs text-slate-500">{label}</div>
      <div className={`font-bold ${c}`}>{value}</div>
    </div>
  );
}

function AccountModal({ account, onSave, onClose }) {
  const [form, setForm] = useState({ ...account });
  const set = (k, v) => setForm((f) => ({ ...f, [k]: v }));
  const submit = () => {
    if (!form.name.trim()) return;
    onSave({ ...form, id: form.id || `acc_${Date.now()}`, fixedAmount: Number(form.fixedAmount) || 0, active: form.active !== false });
  };
  return (
    <div className="fixed inset-0 bg-black/40 z-30 flex items-end sm:items-center justify-center p-0 sm:p-4">
      <div className="bg-white w-full sm:max-w-sm rounded-t-2xl sm:rounded-2xl p-5">
        <div className="flex items-center justify-between mb-4">
          <h3 className="font-semibold">{account.id ? '编辑账户' : '新增账户'}</h3>
          <button onClick={onClose}><X className="w-5 h-5 text-slate-400" /></button>
        </div>
        <div className="space-y-3">
          <Field label="名称">
            <input value={form.name} onChange={(e) => set('name', e.target.value)}
              className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm" placeholder="如 工资 / 房贷（无需填写成员）" />
          </Field>
          <Field label="类型">
            <select value={form.type} onChange={(e) => set('type', e.target.value)} className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm">
              <option value="asset">资产</option>
              <option value="liability">负债</option>
              <option value="income">收入</option>
              <option value="expense">支出</option>
            </select>
          </Field>
          {form.type === 'asset' && (
            <Field label="资产大类">
              <select value={form.category} onChange={(e) => set('category', e.target.value)} className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm">
                <option value="cash">现金</option>
                <option value="investment">投资</option>
                <option value="fixed">固定资产</option>
              </select>
            </Field>
          )}
          {form.type === 'expense' && (
            <div>
              <label className="flex items-center gap-2 text-sm">
                <input type="checkbox" checked={form.isFixed} onChange={(e) => set('isFixed', e.target.checked)} className="accent-indigo-600" />
                这是固定支出（房贷/房租等每月固定）
              </label>
              {form.isFixed && (
                <Field label="每月默认金额">
                  <input type="number" value={form.fixedAmount} onChange={(e) => set('fixedAmount', e.target.value)}
                    className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm" />
                </Field>
              )}
            </div>
          )}
          <Field label="归属成员">
            <select value={form.member} onChange={(e) => set('member', e.target.value)} className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm">
              {MEMBERS.map((m) => <option key={m} value={m}>{m}</option>)}
            </select>
          </Field>
        </div>
        <button onClick={submit} className="w-full mt-4 bg-indigo-600 text-white rounded-lg py-2.5 font-medium">保存</button>
      </div>
    </div>
  );
}

function Field({ label, children }) {
  return (
    <div>
      <label className="block text-xs text-slate-500 mb-1">{label}</label>
      {children}
    </div>
  );
}

// ---------- 月度结账 ----------
function Closing({ accounts, setAccounts, records, setRecords, series, monthStatus, setMonthStatus, monthMeta, setMonthMeta, goals, setGoalHistory }) {
  const months = Object.keys(records).sort();
  const [sel, setSel] = useState(months[months.length - 1]);
  const [deleteMonth, setDeleteMonth] = useState(null);
  const [closeCheckOpen, setCloseCheckOpen] = useState(false);
  const [actionDraft, setActionDraft] = useState('');
  const [actionMetric, setActionMetric] = useState('none');
  const [deleteAction, setDeleteAction] = useState(null);
  const [copyStatus, setCopyStatus] = useState('');
  const [activeMember, setActiveMember] = useState('老公');
  const [historyOpen, setHistoryOpen] = useState(false);
  const now = new Date();
  const currentMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
  const [newMonth, setNewMonth] = useState(() => months.length ? nextMonth(months[months.length - 1]) : currentMonth);

  const rec = records[sel] || {};
  const previousMonths = months.filter((m) => m < sel);
  const previousMonth = previousMonths[previousMonths.length - 1];
  const previousRec = records[previousMonth] || {};
  const selectedSummary = series.find((s) => s.month === sel);
  const previousSummary = series.find((s) => s.month === previousMonth);
  const isClosed = monthStatus[sel] === 'closed';
  const currentActions = Array.isArray(monthMeta[sel]?.actions) ? monthMeta[sel].actions : [];
  const previousActions = Array.isArray(monthMeta[previousMonth]?.actions) ? monthMeta[previousMonth].actions : [];
  useEffect(() => { setActionDraft(''); setActionMetric('none'); setCopyStatus(''); }, [sel]);
  const setVal = (id, v) => {
    if (!sel || isClosed) return;
    const value = v === '' ? '' : (Number(v) || 0);
    setRecords((prev) => ({ ...prev, [sel]: { ...prev[sel], [id]: value } }));
    const account = accounts.find((a) => a.id === id);
    if (account?.type === 'expense' && account.isFixed && sel === months[months.length - 1]) {
      setAccounts((prev) => prev.map((a) => a.id === id ? { ...a, fixedAmount: value === '' ? 0 : value } : a));
    }
  };

  const addMonth = () => {
    const nm = newMonth;
    if (!/^\d{4}-\d{2}$/.test(nm)) return;
    if (records[nm]) { setSel(nm); return; }
    const previousMonths = months.filter((m) => m < nm);
    const last = previousMonths[previousMonths.length - 1];
    const prefill = {};
    accounts.filter(isActive).forEach((a) => {
      if (a.type === 'asset' || a.type === 'liability') prefill[a.id] = (last && records[last]?.[a.id]) || 0;
      else if (a.type === 'expense' && a.isFixed) prefill[a.id] = a.fixedAmount;
      else prefill[a.id] = 0;
    });
    setRecords((prev) => ({ ...prev, [nm]: prefill }));
    setMonthStatus((prev) => ({ ...prev, [nm]: 'draft' }));
    setSel(nm);
    setNewMonth(nextMonth(nm));
  };

  const delMonth = (m) => {
    setRecords((prev) => {
      const copy = { ...prev };
      delete copy[m];
      return copy;
    });
    setMonthStatus((prev) => {
      const copy = { ...prev };
      delete copy[m];
      return copy;
    });
    setMonthMeta((prev) => {
      const copy = { ...prev };
      delete copy[m];
      return copy;
    });
    setGoalHistory((prev) => {
      const copy = { ...prev };
      delete copy[m];
      return copy;
    });
    if (m === sel) {
      const remain = Object.keys(records).filter((x) => x !== m).sort();
      setSel(remain[remain.length - 1]);
    }
    setDeleteMonth(null);
  };

  const groups = [
    { type: 'asset', title: '资产（月末余额）' },
    { type: 'liability', title: '负债（月末余额）' },
    { type: 'income', title: '收入（当月发生额）' },
    { type: 'expense', title: '支出（当月发生额）' },
  ];
  const closingMembers = ['老公', '老婆', '共同'];

  let inc = 0, exp = 0;
  accounts.forEach((a) => {
    const v = Number(rec[a.id]) || 0;
    if (a.type === 'income') inc += v;
    if (a.type === 'expense') exp += v;
  });

  const activeAccounts = accounts.filter(isActive);
  const closeBlockers = activeAccounts
    .filter((a) => !Object.prototype.hasOwnProperty.call(rec, a.id) || rec[a.id] === '' || rec[a.id] == null)
    .map((a) => `${a.type === 'expense' && a.isFixed ? '固定支出' : '账户'}「${a.member} · ${a.name}」未填写`);
  const closeWarnings = [];
  if (inc === 0) closeWarnings.push('本月收入合计为 0，请确认是否符合实际情况。');
  activeAccounts.filter((a) => (a.type === 'asset' || a.type === 'liability') && Number(rec[a.id]) === 0)
    .forEach((a) => closeWarnings.push(`${a.type === 'asset' ? '资产' : '负债'}「${a.member} · ${a.name}」为 0。`));
  if (previousMonth) {
    activeAccounts.filter((a) => a.type === 'asset' || a.type === 'liability').forEach((a) => {
      const current = Number(rec[a.id]) || 0;
      const previous = Number(previousRec[a.id]) || 0;
      const change = current - previous;
      if (previous !== 0 && Math.abs(change) >= 10000 && Math.abs(change / previous) >= 0.5) {
        closeWarnings.push(`「${a.member} · ${a.name}」较上月变化较大：${fmtYuan(previous)} → ${fmtYuan(current)}。`);
      }
    });
  }

  const closeMonth = () => {
    const snapshots = {};
    goals.forEach((goal) => {
      snapshots[goal.id] = {
        name: goal.name,
        targetAmount: Number(goal.targetAmount) || 0,
        currentAmount: resolveGoalCurrentAmount(goal, rec),
        targetDate: goal.targetDate,
        linkedAccountIds: Array.isArray(goal.linkedAccountIds) ? goal.linkedAccountIds : [],
      };
    });
    setGoalHistory((prev) => ({ ...prev, [sel]: snapshots }));
    setMonthStatus((prev) => ({ ...prev, [sel]: 'closed' }));
    setCloseCheckOpen(false);
  };
  const reopenMonth = () => {
    setMonthStatus((prev) => ({ ...prev, [sel]: 'draft' }));
    setMonthMeta((prev) => ({ ...prev, [sel]: { ...(prev[sel] || {}), reopenedAt: new Date().toISOString() } }));
  };
  const updateActions = (month, updater) => setMonthMeta((prev) => {
    const meta = prev[month] || {};
    const actions = Array.isArray(meta.actions) ? meta.actions : [];
    return { ...prev, [month]: { ...meta, actions: updater(actions) } };
  });
  const addAction = () => {
    const text = actionDraft.trim();
    if (!sel || !text || currentActions.length >= 2) return;
    updateActions(sel, (actions) => [...actions, { id: `action_${Date.now()}`, text, done: false, metric: actionMetric }]);
    setActionDraft('');
    setActionMetric('none');
  };
  const toggleAction = (month, id) => updateActions(month, (actions) => actions.map((action) => action.id === id ? { ...action, done: !action.done } : action));
  const confirmDeleteAction = () => {
    updateActions(deleteAction.month, (actions) => actions.filter((action) => action.id !== deleteAction.id));
    setDeleteAction(null);
  };
  const setChangeReason = (accountId, reason) => setMonthMeta((prev) => {
    const meta = prev[sel] || {};
    const changeReasons = { ...(meta.changeReasons || {}) };
    if (reason) changeReasons[accountId] = reason;
    else delete changeReasons[accountId];
    return { ...prev, [sel]: { ...meta, changeReasons } };
  });
  const monthlyBrief = selectedSummary ? [
    `${sel} 家庭财务简报（${isClosed ? '已结账' : '录入中'}）`,
    '',
    '一、我们站在哪里',
    `净资产 ${fmtYuan(selectedSummary.nw)}，总资产 ${fmtYuan(selectedSummary.assets)}，总负债 ${fmtYuan(selectedSummary.liab)}。`,
    `本月收入 ${fmtYuan(selectedSummary.inc)}，支出 ${fmtYuan(selectedSummary.exp)}，结余 ${yuanSign(selectedSummary.saved)}。`,
    '',
    '二、为什么发生变化',
    selectedSummary.netChange == null
      ? '这是首个月度记录，暂无净资产环比变化。'
      : `净资产变化 ${yuanSign(selectedSummary.netChange)} = 结余 ${yuanSign(selectedSummary.saved)} + 非收支变化 ${yuanSign(selectedSummary.nonCashChange)}。`,
    ...(selectedSummary.drivers.length > 0
      ? selectedSummary.drivers.slice(0, 3).map((driver) => `主要变化：${driver.name} ${yuanSign(driver.contribution)}${driver.reason ? `（${driver.reason}）` : ''}`)
      : ['本月没有可识别的资产或负债账户变化。']),
    '',
    '三、下月做什么',
    ...(previousActions.length > 0
      ? [`上月行动完成 ${previousActions.filter((action) => action.done === true).length}/${previousActions.length} 项。`]
      : []),
    ...(currentActions.length > 0
      ? currentActions.map((action, index) => `${index + 1}. ${action.done ? '已完成' : '待完成'}：${action.text}`)
      : ['尚未记录下月行动。']),
  ].join('\n') : '';
  const copyMonthlyBrief = async () => {
    try {
      if (!navigator.clipboard?.writeText) throw new Error('clipboard unavailable');
      await navigator.clipboard.writeText(monthlyBrief);
      setCopyStatus('copied');
    } catch {
      setCopyStatus('error');
    }
    setTimeout(() => setCopyStatus(''), 2000);
  };

  return (
    <div className="space-y-4">
      <div className="bg-white rounded-xl p-4 border border-slate-200 flex items-center gap-2 flex-wrap">
        <span className="text-sm text-slate-500">结账月份</span>
        <select value={sel || ''} onChange={(e) => { setSel(e.target.value); setCloseCheckOpen(false); }} className="border border-slate-200 rounded-lg px-3 py-2 text-sm">
          {months.length === 0 && <option value="">（暂无月份）</option>}
          {months.map((m) => <option key={m} value={m}>{m}</option>)}
        </select>
        {sel && <span className={`text-xs font-medium px-2 py-1 rounded-full ${isClosed ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'}`}>{isClosed ? '已结账' : '录入中'}</span>}
        <div className="ml-auto flex items-center gap-2">
          <input type="month" value={newMonth} onChange={(e) => setNewMonth(e.target.value)}
            className="border border-slate-200 rounded-lg px-2 py-2 text-sm" />
          <button onClick={addMonth} className="flex items-center gap-1 text-sm bg-indigo-600 text-white px-3 py-2 rounded-lg whitespace-nowrap">
            <PlusCircle className="w-4 h-4" />选择/新建
          </button>
        </div>
      </div>

      {!sel ? (
        <p className="text-sm text-slate-500 bg-white rounded-xl p-4 border border-slate-200">还没有任何月份，点右上角「结算新月份」开始录入。</p>
      ) : (
        <>
          <div className="bg-white rounded-xl p-4 border border-slate-200 grid grid-cols-3 gap-2 text-center">
            <MiniStat label="本月收入" value={fmtWan(inc)} c="text-emerald-600" />
            <MiniStat label="本月支出" value={fmtWan(exp)} c="text-amber-600" />
            <MiniStat label="本月攒的" value={fmtWan(inc - exp)} c="text-indigo-600" />
          </div>

          {isClosed && (
            <div className="flex items-center gap-3 bg-emerald-50 border border-emerald-200 rounded-xl px-4 py-3">
              <Lock className="w-5 h-5 text-emerald-600 shrink-0" />
              <p className="text-sm text-emerald-800 flex-1">该月份已结账，数据已锁定，避免后续误改。</p>
              <button onClick={reopenMonth} className="text-sm px-3 py-2 bg-white border border-emerald-300 text-emerald-700 rounded-lg whitespace-nowrap">重新编辑</button>
            </div>
          )}

          <div className="grid grid-cols-3 gap-1 bg-white rounded-xl p-1 border border-slate-200 sm:hidden">
            {closingMembers.map((member) => (
              <button key={member} onClick={() => setActiveMember(member)}
                className={`rounded-lg px-3 py-2 text-sm ${activeMember === member ? 'bg-indigo-600 text-white font-medium' : 'text-slate-500'}`}>{member}</button>
            ))}
          </div>

          {closingMembers.map((member) => {
            const memberAccounts = accounts.filter((a) => a.member === member && isActive(a));
            return (
              <div key={member} id={`closing-${member}`} className={`${activeMember === member ? 'block' : 'hidden'} sm:block bg-white rounded-xl border border-slate-200 overflow-hidden`}>
                <div className="px-4 py-3 bg-slate-50 border-b border-slate-200 font-semibold text-slate-700">{member}</div>
                {groups.map((g) => {
                  const rows = memberAccounts.filter((a) => a.type === g.type);
                  if (!rows.length) return null;
                  return (
                    <div key={g.type} className="px-4 py-3 border-b border-slate-100 last:border-b-0">
                      <div className="text-xs font-medium text-slate-400 mb-2">{g.title}</div>
                      <div className="space-y-3">
                        {rows.map((a) => {
                          const currentValue = Number(rec[a.id]) || 0;
                          const previousValue = Number(previousRec[a.id]) || 0;
                          const change = currentValue - previousValue;
                          const showPrevious = a.type === 'asset' || a.type === 'liability';
                          return (
                            <div key={a.id} className="flex items-start gap-3">
                              <div className="flex-1 min-w-0 pt-1">
                                <div className="text-sm truncate">
                                  {a.name}
                                  {a.type === 'expense' && a.isFixed && <span className="ml-1 text-xs text-amber-600">固定</span>}
                                </div>
                                {showPrevious && (
                                  previousMonth ? (
                                    <div className="text-xs text-slate-400 mt-0.5">
                                      上月 {fmtYuan(previousValue)} · <span className={change === 0 ? 'text-slate-400' : change > 0 ? 'text-emerald-600' : 'text-rose-500'}>变化 {yuanSign(change)}</span>
                                    </div>
                                  ) : <div className="text-xs text-slate-400 mt-0.5">暂无上月数据</div>
                                )}
                              </div>
                              <input type="number" aria-label={`${member} ${a.name}`} value={rec[a.id] ?? ''}
                                onChange={(e) => setVal(a.id, e.target.value)} onBlur={(e) => { if (e.target.value === '') setVal(a.id, 0); }}
                                disabled={isClosed}
                                className="w-32 border border-slate-200 rounded-lg px-3 py-1.5 text-sm text-right disabled:bg-slate-100 disabled:text-slate-500 disabled:cursor-not-allowed" />
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
                {memberAccounts.length === 0 && <p className="px-4 py-3 text-xs text-slate-400">暂无启用账户</p>}
              </div>
            );
          })}

          <p className="text-xs text-slate-400 bg-white rounded-lg px-3 py-2 border border-slate-200">
            {isClosed ? '该月份已锁定。需要修正数据时，请先点「重新编辑」。' : sel === months[months.length - 1] ? '最新月份的固定支出修改后，会同步为以后月份的默认金额。' : '历史月份的修改只影响当月，不会改变以后月份的默认金额。'}
          </p>

          {selectedSummary?.netChange != null && (
            <div className="bg-white rounded-xl p-4 border border-slate-200">
              <div className="text-sm font-medium text-slate-700 mb-1">本月净资产变化</div>
              <p className="text-sm text-slate-600">
                <span className="font-medium text-indigo-600">{yuanSign(selectedSummary.netChange)}</span>
                {' = '}结余 <span className="text-emerald-600">{yuanSign(selectedSummary.saved)}</span>
                {' + '}非收支变化 <span className={selectedSummary.nonCashChange >= 0 ? 'text-amber-600' : 'text-rose-600'}>{yuanSign(selectedSummary.nonCashChange)}</span>
              </p>
              {selectedSummary.drivers.length > 0 && (
                <div className="mt-3 space-y-2">
                  <div className="text-xs text-slate-400">主要变化账户 · 原因可选</div>
                  {selectedSummary.drivers.slice(0, 3).map((driver) => (
                    <div key={driver.accountId} className="flex flex-col sm:flex-row sm:items-center gap-2 text-xs">
                      <span className="flex-1 text-slate-600">{driver.name} <span className={driver.contribution >= 0 ? 'text-emerald-600' : 'text-rose-600'}>{yuanSign(driver.contribution)}</span></span>
                      <select value={driver.reason} onChange={(e) => setChangeReason(driver.accountId, e.target.value)} aria-label={`${driver.name} 变化原因`}
                        className="sm:w-40 border border-slate-200 rounded-lg px-2 py-1.5 bg-white text-slate-600">
                        <option value="">未标注</option>
                        <option value="市场涨跌">市场涨跌</option>
                        <option value="主动转入/转出">主动转入／转出</option>
                        <option value="估值调整">估值调整</option>
                        <option value="偿还/新增负债">偿还／新增负债</option>
                        <option value="数据修正">数据修正</option>
                        <option value="其他">其他</option>
                      </select>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {!isClosed && (
            <button onClick={() => setCloseCheckOpen(true)} className="w-full flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl py-3 text-sm font-medium">
              <Lock className="w-4 h-4" />完成本月结账
            </button>
          )}

          {isClosed && selectedSummary && (
            <div className="bg-white rounded-xl p-4 border border-slate-200">
              <div className="flex items-center justify-between gap-3 mb-2">
                <div className="text-sm font-semibold text-slate-700">月度家庭简报</div>
                <button onClick={copyMonthlyBrief} className={`shrink-0 text-xs px-3 py-1.5 rounded-lg ${copyStatus === 'copied' ? 'bg-emerald-50 text-emerald-600' : copyStatus === 'error' ? 'bg-rose-50 text-rose-600' : 'bg-indigo-50 text-indigo-600 hover:bg-indigo-100'}`}>
                  {copyStatus === 'copied' ? '已复制' : copyStatus === 'error' ? '复制失败' : '复制简报'}
                </button>
              </div>
              <pre className="whitespace-pre-wrap font-sans text-xs text-slate-600 leading-5 bg-slate-50 rounded-lg p-3 border border-slate-100">{monthlyBrief}</pre>
              {copyStatus === 'error' && <p className="text-xs text-rose-600 mt-2">当前浏览器未允许访问剪贴板，请长按上方文字手动复制。</p>}
            </div>
          )}

          {isClosed && previousActions.length > 0 && (
            <div className="bg-white rounded-xl p-4 border border-slate-200">
              <div className="text-sm font-semibold text-slate-700 mb-1">上月行动复盘 · {previousMonth}</div>
              <p className="text-xs text-slate-400 mb-2">在本月结账时确认上月行动是否完成</p>
              <div className="space-y-2">
                {previousActions.map((action) => (
                  <label key={action.id} className="flex items-start gap-2 text-sm text-slate-600 cursor-pointer">
                    <input type="checkbox" checked={action.done === true} onChange={() => toggleAction(previousMonth, action.id)} className="mt-0.5 accent-indigo-600" />
                    <span className="flex-1"><span className={action.done ? 'line-through text-slate-400' : ''}>{action.text}</span>
                      {action.metric && action.metric !== 'none' && <span className="block text-xs text-slate-400 mt-0.5">{ACTION_METRICS[action.metric]} · 同期变化 {yuanSign(actionMetricChange(action.metric, previousSummary, selectedSummary))}</span>}
                    </span>
                  </label>
                ))}
              </div>
            </div>
          )}

          {isClosed && <div className="bg-white rounded-xl p-4 border border-slate-200">
            <div className="text-sm font-semibold text-slate-700 mb-1">下月行动 · 最多 2 项</div>
            <p className="text-xs text-slate-400 mb-2">行动会在下个月结账时自动出现，形成复盘闭环。</p>
            {currentActions.length > 0 && <div className="space-y-2 mb-3">
              {currentActions.map((action) => (
                <div key={action.id} className="flex items-start gap-2 text-sm text-slate-600">
                  <input type="checkbox" checked={action.done === true} onChange={() => toggleAction(sel, action.id)} className="mt-0.5 accent-indigo-600" />
                  <span className={`flex-1 ${action.done ? 'line-through text-slate-400' : ''}`}>{action.text}{action.metric && action.metric !== 'none' ? <span className="block text-xs text-slate-400 mt-0.5">观察：{ACTION_METRICS[action.metric]}</span> : null}</span>
                  <button onClick={() => setDeleteAction({ month: sel, id: action.id })} className="text-slate-300 hover:text-rose-500" title="删除行动"><Trash2 className="w-4 h-4" /></button>
                </div>
              ))}
            </div>}
            {currentActions.length < 2 && <div className="grid sm:grid-cols-[1fr_9rem_auto] gap-2">
              <input value={actionDraft} onChange={(e) => setActionDraft(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') addAction(); }} placeholder="例如：共同账户增加 5,000 元现金"
                className="min-w-0 border border-slate-200 rounded-lg px-3 py-2 text-sm" />
              <select value={actionMetric} onChange={(e) => setActionMetric(e.target.value)} aria-label="行动观察指标" className="border border-slate-200 rounded-lg px-2 py-2 text-sm bg-white text-slate-600">
                {Object.entries(ACTION_METRICS).map(([value, label]) => <option key={value} value={value}>{label}</option>)}
              </select>
              <button onClick={addAction} className="shrink-0 bg-indigo-600 text-white rounded-lg px-3 py-2 text-sm">添加</button>
            </div>}
          </div>}
        </>
      )}

      <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <button onClick={() => setHistoryOpen((open) => !open)} className={`w-full px-4 py-3 text-sm font-semibold text-slate-700 flex items-center justify-between ${historyOpen ? 'border-b border-slate-100' : ''}`}>
          <span>历史记录 · {series.length} 个月</span>
          <ChevronDown className={`w-4 h-4 text-slate-400 transition-transform ${historyOpen ? 'rotate-180' : ''}`} />
        </button>
        {historyOpen && <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead>
              <tr className="text-xs text-slate-400 bg-slate-50">
                <th className="text-left px-4 py-2 font-medium">月份</th>
                <th className="text-right px-3 py-2 font-medium">净资产</th>
                <th className="text-right px-3 py-2 font-medium">攒的</th>
                <th className="text-right px-3 py-2 font-medium">非收支变化</th>
                <th className="px-3 py-2"></th>
              </tr>
            </thead>
            <tbody>
              {[...series].reverse().map((s) => (
                <tr key={s.month} className={`border-t border-slate-50 ${s.month === sel ? 'bg-indigo-50' : 'hover:bg-slate-50'}`}>
                  <td className="px-4 py-2 cursor-pointer text-indigo-600 font-medium" onClick={() => setSel(s.month)}>{s.month}</td>
                  <td className="px-3 py-2 text-right">{fmtWan(s.nw)}</td>
                  <td className="px-3 py-2 text-right text-emerald-600">{wanSign(s.saved)}</td>
                  <td className={`px-3 py-2 text-right ${(s.nonCashChange || 0) >= 0 ? 'text-amber-600' : 'text-rose-500'}`}>{s.netChange == null ? '-' : wanSign(s.nonCashChange)}</td>
                  <td className="px-3 py-2 text-right">
                    <button onClick={() => setDeleteMonth(s.month)} className="text-slate-300 hover:text-rose-500" title={`删除 ${s.month}`}><Trash2 className="w-4 h-4" /></button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>}
      </div>
      {deleteMonth && (
        <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4">
          <div className="bg-white rounded-2xl p-5 max-w-sm w-full shadow-xl">
            <div className="flex items-center gap-2 mb-2">
              <AlertTriangle className="w-5 h-5 text-rose-600" />
              <h3 className="font-semibold">删除月度记录</h3>
            </div>
            <p className="text-sm text-slate-600 mb-2">确定删除 <span className="font-medium">{deleteMonth}</span> 的全部结账数据吗？</p>
            <p className="text-xs text-rose-600 bg-rose-50 rounded-lg p-2.5 mb-4">删除后，该月份将从净资产趋势、年度统计和历史记录中移除，且无法恢复。</p>
            <div className="flex gap-2 justify-end">
              <button onClick={() => setDeleteMonth(null)} className="px-4 py-2 text-sm text-slate-600 hover:bg-slate-100 rounded-lg">取消</button>
              <button onClick={() => delMonth(deleteMonth)} className="px-4 py-2 text-sm bg-rose-600 hover:bg-rose-700 text-white rounded-lg">确认删除</button>
            </div>
          </div>
        </div>
      )}
      {deleteAction && (
        <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4">
          <div className="bg-white rounded-2xl p-5 max-w-sm w-full shadow-xl">
            <div className="flex items-center gap-2 mb-2"><AlertTriangle className="w-5 h-5 text-rose-600" /><h3 className="font-semibold">删除行动项</h3></div>
            <p className="text-sm text-slate-600 mb-4">删除后，该行动不会在下个月结账时出现。</p>
            <div className="flex gap-2 justify-end"><button onClick={() => setDeleteAction(null)} className="px-4 py-2 text-sm text-slate-600 hover:bg-slate-100 rounded-lg">取消</button><button onClick={confirmDeleteAction} className="px-4 py-2 text-sm bg-rose-600 text-white rounded-lg">确认删除</button></div>
          </div>
        </div>
      )}
      {closeCheckOpen && sel && (
        <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4">
          <div className="bg-white rounded-2xl p-5 max-w-md w-full shadow-xl max-h-[85vh] overflow-y-auto">
            <div className="flex items-center gap-2 mb-2">
              <AlertTriangle className={`w-5 h-5 ${closeBlockers.length ? 'text-rose-600' : 'text-amber-600'}`} />
              <h3 className="font-semibold">结账检查 · {sel}</h3>
            </div>
            {closeBlockers.length > 0 ? (
              <div className="mb-4">
                <p className="text-sm font-medium text-rose-700 mb-2">以下项目尚未填写，补齐后才能结账：</p>
                <ul className="space-y-1 text-sm text-rose-700 bg-rose-50 rounded-lg p-3">
                  {closeBlockers.map((item) => <li key={item}>• {item}</li>)}
                </ul>
              </div>
            ) : (
              <p className="text-sm text-emerald-700 bg-emerald-50 rounded-lg p-3 mb-4">所有启用账户均已填写，可以结账。</p>
            )}
            {closeWarnings.length > 0 ? (
              <div className="mb-4">
                <p className="text-sm font-medium text-amber-700 mb-2">请确认以下提醒，确认无误后仍可结账：</p>
                <ul className="space-y-1 text-sm text-amber-800 bg-amber-50 rounded-lg p-3">
                  {closeWarnings.map((item, i) => <li key={`${item}-${i}`}>• {item}</li>)}
                </ul>
              </div>
            ) : !closeBlockers.length && <p className="text-sm text-slate-500 mb-4">未发现异常提醒。</p>}
            <div className="flex gap-2 justify-end">
              <button onClick={() => setCloseCheckOpen(false)} className="px-4 py-2 text-sm text-slate-600 hover:bg-slate-100 rounded-lg">{closeBlockers.length ? '返回补充' : '取消'}</button>
              {!closeBlockers.length && <button onClick={closeMonth} className="px-4 py-2 text-sm bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg">确认结账</button>}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ---------- 家庭目标 ----------
function Goals({ goals, setGoals, goalHistory, setGoalHistory, accounts, records, latest }) {
  const emptyDraft = { name: '', targetAmount: '', currentAmount: '', targetDate: '', priority: 'medium', linkedAccountIds: [] };
  const [draft, setDraft] = useState(emptyDraft);
  const [editingId, setEditingId] = useState(null);
  const [error, setError] = useState('');
  const [deleteId, setDeleteId] = useState(null);
  const [formOpen, setFormOpen] = useState(goals.length === 0);
  const now = new Date();
  const currentMonthIndex = now.getFullYear() * 12 + now.getMonth();
  const priorityLabel = { high: '优先', medium: '正常', low: '以后' };
  const priorityTone = { high: 'bg-rose-50 text-rose-600', medium: 'bg-indigo-50 text-indigo-600', low: 'bg-slate-100 text-slate-500' };
  const assetAccounts = accounts.filter((account) => account.type === 'asset');
  const latestRec = records[latest?.month] || {};
  const sortedGoals = goals.slice().sort((a, b) => {
    const order = { high: 0, medium: 1, low: 2 };
    return (order[a.priority] ?? 1) - (order[b.priority] ?? 1) || String(a.targetDate || '').localeCompare(String(b.targetDate || ''));
  });

  const saveGoal = () => {
    const name = draft.name.trim();
    const targetAmount = Number(draft.targetAmount);
    const currentAmount = Number(draft.currentAmount) || 0;
    const linkedAccountIds = Array.isArray(draft.linkedAccountIds) ? draft.linkedAccountIds : [];
    const conflictingAccounts = linkedAccountIds.filter((accountId) => goals.some((goal) => goal.id !== editingId && Array.isArray(goal.linkedAccountIds) && goal.linkedAccountIds.includes(accountId)));
    if (!name || !(targetAmount > 0) || currentAmount < 0 || !draft.targetDate) {
      setError('请填写目标名称、目标金额和目标日期，当前已准备金额不能为负数。');
      return;
    }
    if (conflictingAccounts.length > 0) {
      setError('同一个资产账户不能同时归属多个目标，请先取消其他目标中的关联。');
      return;
    }
    const goal = { name, targetAmount, currentAmount, targetDate: draft.targetDate, priority: draft.priority, linkedAccountIds };
    if (editingId) setGoals((prev) => prev.map((item) => item.id === editingId ? { ...item, ...goal } : item));
    else setGoals((prev) => [...prev, { id: `goal_${Date.now()}`, ...goal }]);
    setDraft(emptyDraft);
    setEditingId(null);
    setError('');
    setFormOpen(false);
  };
  const editGoal = (goal) => {
    setDraft({ name: goal.name, targetAmount: String(goal.targetAmount), currentAmount: String(goal.currentAmount || ''), targetDate: goal.targetDate, priority: goal.priority || 'medium', linkedAccountIds: Array.isArray(goal.linkedAccountIds) ? goal.linkedAccountIds : [] });
    setEditingId(goal.id);
    setError('');
    setFormOpen(true);
  };
  const cancelEdit = () => { setDraft(emptyDraft); setEditingId(null); setError(''); setFormOpen(false); };
  const confirmDelete = () => {
    setGoals((prev) => prev.filter((goal) => goal.id !== deleteId));
    setGoalHistory((prev) => Object.fromEntries(Object.entries(prev).map(([month, snapshots]) => {
      const nextSnapshots = { ...(snapshots || {}) };
      delete nextSnapshots[deleteId];
      return [month, nextSnapshots];
    })));
    if (editingId === deleteId) cancelEdit();
    setDeleteId(null);
  };

  return (
    <div className="space-y-4">
      {!formOpen && (
        <div className="flex justify-end">
          <button onClick={() => { setFormOpen(true); setEditingId(null); setDraft(emptyDraft); setError(''); }}
            className="flex items-center gap-1 text-sm bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg px-4 py-2"><PlusCircle className="w-4 h-4" />新增目标</button>
        </div>
      )}
      {formOpen && <div className="bg-white rounded-xl p-4 border border-slate-200">
        <div className="font-semibold mb-1">{editingId ? '编辑家庭目标' : '新增家庭目标'}</div>
        <p className="text-xs text-slate-400 mb-3">目标金额用于衡量家庭计划，不会计入资产或影响月度结账。</p>
        <div className="grid sm:grid-cols-2 gap-3">
          <label className="text-sm text-slate-600">目标名称
            <input value={draft.name} onChange={(e) => setDraft((d) => ({ ...d, name: e.target.value }))} placeholder="例如：6个月应急资金"
              className="mt-1 w-full border border-slate-200 rounded-lg px-3 py-2 text-slate-800" />
          </label>
          <label className="text-sm text-slate-600">目标日期
            <input type="month" value={draft.targetDate} onChange={(e) => setDraft((d) => ({ ...d, targetDate: e.target.value }))}
              className="mt-1 w-full border border-slate-200 rounded-lg px-3 py-2 text-slate-800" />
          </label>
          <label className="text-sm text-slate-600">目标金额
            <input type="number" min="0" inputMode="decimal" value={draft.targetAmount} onChange={(e) => setDraft((d) => ({ ...d, targetAmount: e.target.value }))} placeholder="0"
              className="mt-1 w-full border border-slate-200 rounded-lg px-3 py-2 text-slate-800" />
          </label>
          <label className="text-sm text-slate-600">当前已准备{draft.linkedAccountIds.length > 0 ? '（自动汇总）' : ''}
            <input type="number" min="0" inputMode="decimal" value={draft.linkedAccountIds.length > 0 ? resolveGoalCurrentAmount({ linkedAccountIds: draft.linkedAccountIds }, latestRec) : draft.currentAmount} onChange={(e) => setDraft((d) => ({ ...d, currentAmount: e.target.value }))} placeholder="0"
              disabled={draft.linkedAccountIds.length > 0}
              className="mt-1 w-full border border-slate-200 rounded-lg px-3 py-2 text-slate-800 disabled:bg-slate-100 disabled:text-slate-400" />
          </label>
          <label className="text-sm text-slate-600">优先级
            <select value={draft.priority} onChange={(e) => setDraft((d) => ({ ...d, priority: e.target.value }))}
              className="mt-1 w-full border border-slate-200 rounded-lg px-3 py-2 text-slate-800 bg-white">
              <option value="high">优先</option><option value="medium">正常</option><option value="low">以后</option>
            </select>
          </label>
          <div className="sm:col-span-2">
            <div className="text-sm text-slate-600 mb-1">关联资金账户（可选）</div>
            {assetAccounts.length === 0 ? <p className="text-xs text-slate-400">暂无资产账户，继续使用手动金额。</p> : (
              <div className="grid sm:grid-cols-2 gap-2 rounded-lg border border-slate-200 p-3">
                {assetAccounts.map((account) => {
                  const usedByOther = goals.some((goal) => goal.id !== editingId && Array.isArray(goal.linkedAccountIds) && goal.linkedAccountIds.includes(account.id));
                  const checked = draft.linkedAccountIds.includes(account.id);
                  const unavailable = usedByOther && !checked;
                  return <label key={account.id} className={`flex items-start gap-2 text-sm ${unavailable ? 'text-slate-300' : 'text-slate-600 cursor-pointer'}`}>
                    <input type="checkbox" checked={checked} disabled={unavailable} onChange={(e) => setDraft((d) => ({ ...d, linkedAccountIds: e.target.checked ? [...d.linkedAccountIds, account.id] : d.linkedAccountIds.filter((id) => id !== account.id) }))} className="mt-0.5 accent-indigo-600" />
                    <span className="flex-1">{account.member} · {account.name}{account.active === false ? '（已停用）' : ''}<span className="block text-xs text-slate-400">最新余额 {fmtYuan(latestRec[account.id] || 0)}{usedByOther ? ' · 已归属其他目标' : ''}</span></span>
                  </label>;
                })}
              </div>
            )}
            <p className="text-xs text-slate-400 mt-1">关联后自动使用这些账户的最新余额；一个账户默认只能归属一个目标，避免重复计算。</p>
          </div>
        </div>
        {error && <p className="text-xs text-rose-600 mt-2">{error}</p>}
        <div className="flex gap-2 mt-3">
          <button onClick={saveGoal} className="text-sm bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg px-4 py-2">{editingId ? '更新目标' : '添加目标'}</button>
          {editingId && <button onClick={cancelEdit} className="text-sm text-slate-500 hover:bg-slate-100 rounded-lg px-4 py-2">取消</button>}
        </div>
      </div>}

      {sortedGoals.length === 0 ? (
        <div className="bg-white rounded-xl p-8 border border-slate-200 text-center text-sm text-slate-400">暂无家庭目标，可以先从应急资金或近期生活计划开始。</div>
      ) : (
        <div className="grid md:grid-cols-2 gap-3">
          {sortedGoals.map((goal) => {
            const linkedAccountIds = Array.isArray(goal.linkedAccountIds) ? goal.linkedAccountIds : [];
            const { targetAmount, currentAmount, gap, monthlyNeed, progress } = getGoalProgress(goal, currentMonthIndex, resolveGoalCurrentAmount(goal, latestRec));
            const history = Object.keys(goalHistory).sort().map((month) => ({ month, ...(goalHistory[month]?.[goal.id] || {}) }))
              .filter((snapshot) => snapshot.currentAmount != null);
            const latestSnapshot = history[history.length - 1];
            const previousSnapshot = history[history.length - 2];
            let actualIncrease = null, plannedIncrease = null;
            if (latestSnapshot && previousSnapshot) {
              actualIncrease = Number(latestSnapshot.currentAmount) - Number(previousSnapshot.currentAmount);
              const previousMonthIndex = monthIndexFromKey(previousSnapshot.month);
              const latestMonthIndex = monthIndexFromKey(latestSnapshot.month);
              const previousPlan = getGoalProgress(previousSnapshot, previousMonthIndex);
              const intervalMonths = Math.max(1, latestMonthIndex - previousMonthIndex);
              plannedIncrease = previousPlan.monthlyNeed == null ? null : previousPlan.monthlyNeed * intervalMonths;
            }
            return <div key={goal.id} className="bg-white rounded-xl p-4 border border-slate-200">
              <div className="flex items-start gap-2">
                <div className="min-w-0 flex-1">
                  <div className="flex items-center gap-2"><span className="font-semibold truncate">{goal.name}</span><span className={`shrink-0 text-xs px-2 py-0.5 rounded-full ${priorityTone[goal.priority] || priorityTone.medium}`}>{priorityLabel[goal.priority] || '正常'}</span></div>
                  <p className="text-xs text-slate-400 mt-1">目标日期 {goal.targetDate}{linkedAccountIds.length > 0 ? ` · 自动汇总 ${linkedAccountIds.length} 个账户` : ' · 手动金额'}</p>
                </div>
                <button onClick={() => editGoal(goal)} className="text-slate-400 hover:text-indigo-600" title={`编辑 ${goal.name}`}><Pencil className="w-4 h-4" /></button>
                <button onClick={() => setDeleteId(goal.id)} className="text-slate-400 hover:text-rose-600" title={`删除 ${goal.name}`}><Trash2 className="w-4 h-4" /></button>
              </div>
              <div className="flex justify-between text-sm mt-3"><span className="text-slate-500">{fmtWan(currentAmount)} / {fmtWan(targetAmount)}</span><span className="font-medium text-indigo-600">{(progress * 100).toFixed(1)}%</span></div>
              <div className="h-2 bg-slate-100 rounded-full overflow-hidden mt-1"><div className="h-full bg-indigo-600 rounded-full" style={{ width: `${Math.min(100, progress * 100)}%` }} /></div>
              <div className="grid grid-cols-2 gap-2 mt-3 text-center">
                <MiniStat label="还差" value={fmtWan(gap)} c={gap > 0 ? 'text-amber-600' : 'text-emerald-600'} />
                <MiniStat label="按期每月需准备" value={gap === 0 ? '已完成' : monthlyNeed == null ? '已到期' : fmtWan(monthlyNeed)} c={gap === 0 ? 'text-emerald-600' : 'text-indigo-600'} />
              </div>
              <div className="mt-3 pt-3 border-t border-slate-100">
                <div className="text-xs font-medium text-slate-500 mb-1">目标进度历史</div>
                {history.length === 0 ? <p className="text-xs text-slate-400">完成月度结账后开始记录目标快照。</p>
                  : history.length === 1 ? <p className="text-xs text-slate-500">{latestSnapshot.month} 已记录首个快照：{fmtWan(latestSnapshot.currentAmount)}</p>
                  : <>
                    <div className="grid grid-cols-3 gap-2 text-center">
                      <MiniStat label="本期实际增加" value={wanSign(actualIncrease)} c={actualIncrease >= 0 ? 'text-emerald-600' : 'text-rose-600'} />
                      <MiniStat label="本期计划增加" value={plannedIncrease == null ? '目标已到期' : fmtWan(plannedIncrease)} c="text-indigo-600" />
                      <MiniStat label="执行状态" value={plannedIncrease == null ? '需重设日期' : actualIncrease >= plannedIncrease ? '达到计划' : `落后 ${fmtWan(plannedIncrease - actualIncrease)}`} c={plannedIncrease != null && actualIncrease >= plannedIncrease ? 'text-emerald-600' : 'text-rose-600'} />
                    </div>
                    <div className="mt-2 flex flex-wrap gap-x-3 gap-y-1 text-xs text-slate-400">
                      {history.slice(-4).map((snapshot, index, shown) => {
                        const prior = index > 0 ? shown[index - 1] : null;
                        const change = prior ? Number(snapshot.currentAmount) - Number(prior.currentAmount) : null;
                        return <span key={snapshot.month}>{snapshot.month} {fmtWan(snapshot.currentAmount)}{change == null ? '' : `（${yuanSign(change)}）`}</span>;
                      })}
                    </div>
                  </>}
              </div>
            </div>;
          })}
        </div>
      )}

      {deleteId && (
        <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4">
          <div className="bg-white rounded-2xl p-5 max-w-sm w-full shadow-xl">
            <div className="flex items-center gap-2 mb-2"><AlertTriangle className="w-5 h-5 text-rose-600" /><h3 className="font-semibold">删除家庭目标</h3></div>
            <p className="text-sm text-slate-600 mb-4">删除后无法恢复，但不会影响账户和月度数据。</p>
            <div className="flex gap-2"><button onClick={confirmDelete} className="flex-1 bg-rose-600 text-white rounded-lg py-2 text-sm">确认删除</button><button onClick={() => setDeleteId(null)} className="flex-1 bg-slate-100 rounded-lg py-2 text-sm">取消</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

// ---------- 年度小结 ----------
function Annual({ annual }) {
  if (!annual.length) return <p className="text-slate-500">暂无数据</p>;

  const chartData = annual.map((a) => ({
    year: a.year,
    净资产: Math.round(a.netWorth / 10000),
    攒的: Math.round(a.saved / 10000),
    非收支变化: Math.round(a.nonCashChange / 10000),
  }));

  const latestY = annual[annual.length - 1];
  const savedAbs = Math.abs(latestY.saved);
  const nonCashChangeAbs = Math.abs(latestY.nonCashChange);
  const barTotal = savedAbs + nonCashChangeAbs || 1;

  return (
    <div className="space-y-4">
      <div className="bg-white rounded-xl p-4 border border-slate-200">
        <div className="font-semibold mb-2">增长拆解 · {latestY.year}</div>
        {latestY.yoyAbs == null ? (
          <p className="text-sm text-slate-500">首个记账年度，暂无同比数据。年内净资产变化 {wanSign(latestY.growth)}。</p>
        ) : (
          <>
            <p className="text-sm text-slate-600 mb-1">
              年末净资产 <span className="font-bold text-indigo-600">{fmtWan(latestY.netWorth)}</span>，
              较上年 <span className={latestY.yoyAbs >= 0 ? 'text-emerald-600 font-medium' : 'text-rose-600 font-medium'}>{wanSign(latestY.yoyAbs)}（{pctSign(latestY.yoyPct)}）</span>
            </p>
            <p className="text-sm text-slate-600 mb-2">
              其中：自己攒的 <span className="text-emerald-600 font-medium">{wanSign(latestY.saved)}</span> ＋ 非收支变化 <span className="text-amber-600 font-medium">{wanSign(latestY.nonCashChange)}</span>
            </p>
            <div className="flex h-3 rounded-full overflow-hidden bg-slate-100">
              <div className="bg-emerald-500" style={{ width: `${(savedAbs / barTotal) * 100}%` }} />
              <div className="bg-amber-500" style={{ width: `${(nonCashChangeAbs / barTotal) * 100}%` }} />
            </div>
            <div className="flex justify-between text-xs text-slate-400 mt-1">
              <span>攒的 {(savedAbs / barTotal * 100).toFixed(0)}%</span>
              <span>非收支变化 {(nonCashChangeAbs / barTotal * 100).toFixed(0)}%</span>
            </div>
          </>
        )}
        <p className="text-xs text-slate-400 mt-2 flex items-start gap-1">
          <Info className="w-3.5 h-3.5 shrink-0 mt-0.5" />“攒的＋非收支变化”是对净资产变化的近似拆解；非收支变化可能包含投资涨跌、估值和余额调整。
        </p>
      </div>

      <div className="bg-white rounded-xl p-4 border border-slate-200">
        <div className="font-semibold mb-2">年末净资产（万元）</div>
        <div className="h-56">
          <ResponsiveContainer width="100%" height="100%">
            <ComposedChart data={chartData}>
              <CartesianGrid strokeDasharray="3 3" stroke="#eee" />
              <XAxis dataKey="year" tick={{ fontSize: 12 }} />
              <YAxis tick={{ fontSize: 11 }} />
              <Tooltip formatter={(v) => v + '万'} />
              <Bar dataKey="净资产" fill="#6366f1" radius={[4, 4, 0, 0]} />
            </ComposedChart>
          </ResponsiveContainer>
        </div>
      </div>

      <div className="bg-white rounded-xl p-4 border border-slate-200">
        <div className="font-semibold mb-2">增长来源：攒的 vs 非收支变化（万元）</div>
        <div className="h-56">
          <ResponsiveContainer width="100%" height="100%">
            <BarChart data={chartData} stackOffset="sign">
              <CartesianGrid strokeDasharray="3 3" stroke="#eee" />
              <XAxis dataKey="year" tick={{ fontSize: 12 }} />
              <YAxis tick={{ fontSize: 11 }} />
              <Tooltip formatter={(v) => v + '万'} />
              <Legend />
              <ReferenceLine y={0} stroke="#cbd5e1" />
              <Bar dataKey="攒的" stackId="g" fill="#10b981" radius={[2, 2, 0, 0]} />
              <Bar dataKey="非收支变化" stackId="g" fill="#f59e0b" radius={[2, 2, 0, 0]} />
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>

      <div className="bg-white rounded-xl p-4 border border-slate-200 overflow-x-auto">
        <div className="font-semibold mb-2">年度明细</div>
        <table className="w-full text-sm whitespace-nowrap">
          <thead>
            <tr className="text-slate-400 border-b border-slate-100">
              <th className="text-left py-2 font-medium sticky left-0 bg-white">年份</th>
              <th className="text-right py-2 px-3 font-medium">年末净资产</th>
              <th className="text-right py-2 px-3 font-medium">同比</th>
              <th className="text-right py-2 px-3 font-medium">年度增长</th>
              <th className="text-right py-2 px-3 font-medium">攒的</th>
              <th className="text-right py-2 px-3 font-medium">非收支变化</th>
              <th className="text-right py-2 px-3 font-medium">储蓄率</th>
              <th className="text-right py-2 px-3 font-medium">年末总资产</th>
              <th className="text-right py-2 px-3 font-medium">年末负债</th>
              <th className="text-right py-2 px-3 font-medium">年内减债</th>
              <th className="text-right py-2 px-3 font-medium">集中度</th>
            </tr>
          </thead>
          <tbody>
            {annual.map((a) => (
              <tr key={a.year} className="border-b border-slate-50">
                <td className="py-2 font-medium sticky left-0 bg-white">{a.year}</td>
                <td className="text-right px-3 font-medium">{fmtWan(a.netWorth)}</td>
                <td className={`text-right px-3 ${a.yoyPct == null ? 'text-slate-400' : a.yoyPct >= 0 ? 'text-emerald-600' : 'text-rose-500'}`}>{a.yoyPct == null ? '首年' : pctSign(a.yoyPct)}</td>
                <td className="text-right px-3 text-indigo-600">{wanSign(a.growth)}</td>
                <td className="text-right px-3 text-emerald-600">{wanSign(a.saved)}</td>
                <td className="text-right px-3 text-amber-600">{wanSign(a.nonCashChange)}</td>
                <td className="text-right px-3">{(a.savingsRate * 100).toFixed(0)}%</td>
                <td className="text-right px-3 text-slate-600">{fmtWan(a.totalAssets)}</td>
                <td className="text-right px-3 text-rose-500">{fmtWan(a.liabilities)}</td>
                <td className="text-right px-3 text-slate-600">{wanSign(a.debtReduced)}</td>
                <td className="text-right px-3 text-amber-600">{(a.concentration * 100).toFixed(0)}%</td>
              </tr>
            ))}
          </tbody>
        </table>
        <p className="text-xs text-slate-400 mt-2">「同比」为年末净资产较上一年末的变化；首年因缺上一年末数据，仅统计当年区间内变化。</p>
      </div>
    </div>
  );
}

// ---------- 本机密码锁 ----------
function PasswordGate() {
  const [unlocked, setUnlocked] = useState(false);
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const hasCustomPassword = (() => {
    try { return Boolean(localStorage.getItem(PASSWORD_KEY)); }
    catch { return false; }
  })();

  const getPassword = () => {
    try { return localStorage.getItem(PASSWORD_KEY) || DEFAULT_PASSWORD; }
    catch { return DEFAULT_PASSWORD; }
  };
  const unlock = () => {
    if (!/^\d{6}$/.test(password)) { setError('请输入6位数字密码'); return; }
    if (password !== getPassword()) { setError('密码错误'); return; }
    setError('');
    setUnlocked(true);
  };
  const changePassword = (oldPassword, newPassword) => {
    if (oldPassword !== getPassword()) return false;
    try {
      localStorage.setItem(PASSWORD_KEY, newPassword);
      return localStorage.getItem(PASSWORD_KEY) === newPassword;
    } catch { return false; }
  };

  if (unlocked) return <FamilyFinance onChangePassword={changePassword} />;
  return (
    <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
      <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 w-full max-w-sm">
        <div className="w-12 h-12 rounded-full bg-indigo-50 text-indigo-600 flex items-center justify-center mx-auto mb-3">
          <Lock className="w-6 h-6" />
        </div>
        <h1 className="text-lg font-bold text-center">家庭财务</h1>
        <p className="text-sm text-slate-500 text-center mt-1 mb-4">请输入6位数字密码</p>
        <input type="password" inputMode="numeric" pattern="[0-9]*" maxLength="6" autoFocus
          value={password} onChange={(e) => { setPassword(e.target.value.replace(/\D/g, '').slice(0, 6)); setError(''); }}
          onKeyDown={(e) => { if (e.key === 'Enter') unlock(); }}
          className="w-full border border-slate-200 rounded-lg px-3 py-3 text-center text-xl tracking-[0.45em]"
          aria-label="6位数字密码" />
        {error && <p className="text-sm text-rose-600 text-center mt-2">{error}</p>}
        <button onClick={unlock} className="w-full mt-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg py-2.5 font-medium">打开</button>
        {!hasCustomPassword && <p className="text-xs text-slate-400 text-center mt-3">首次使用默认密码：123456</p>}
        <p className="text-xs text-slate-400 text-center mt-2">这是本机页面锁，不会加密浏览器中保存的财务数据。</p>
      </div>
    </div>
  );
}

function PasswordModal({ onSave, onClose }) {
  const [oldPassword, setOldPassword] = useState('');
  const [newPassword, setNewPassword] = useState('');
  const [confirmPassword, setConfirmPassword] = useState('');
  const [error, setError] = useState('');
  const clean = (v) => v.replace(/\D/g, '').slice(0, 6);
  const submit = () => {
    if (!/^\d{6}$/.test(oldPassword) || !/^\d{6}$/.test(newPassword)) { setError('密码必须是6位数字'); return; }
    if (newPassword !== confirmPassword) { setError('两次输入的新密码不一致'); return; }
    if (!onSave(oldPassword, newPassword)) { setError('原密码错误或新密码保存失败'); return; }
  };
  return (
    <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4">
      <div className="bg-white rounded-2xl p-5 max-w-sm w-full shadow-xl">
        <div className="flex items-center justify-between mb-4">
          <h3 className="font-semibold flex items-center gap-2"><Lock className="w-5 h-5 text-indigo-600" />修改密码</h3>
          <button onClick={onClose}><X className="w-5 h-5 text-slate-400" /></button>
        </div>
        <div className="space-y-3">
          <Field label="原密码"><input type="password" inputMode="numeric" maxLength="6" value={oldPassword} onChange={(e) => { setOldPassword(clean(e.target.value)); setError(''); }} className="w-full border border-slate-200 rounded-lg px-3 py-2" /></Field>
          <Field label="新密码（6位数字）"><input type="password" inputMode="numeric" maxLength="6" value={newPassword} onChange={(e) => { setNewPassword(clean(e.target.value)); setError(''); }} className="w-full border border-slate-200 rounded-lg px-3 py-2" /></Field>
          <Field label="再次输入新密码"><input type="password" inputMode="numeric" maxLength="6" value={confirmPassword} onChange={(e) => { setConfirmPassword(clean(e.target.value)); setError(''); }} className="w-full border border-slate-200 rounded-lg px-3 py-2" /></Field>
        </div>
        {error && <p className="text-sm text-rose-600 mt-3">{error}</p>}
        <p className="text-xs text-slate-400 mt-3">密码仅保存在当前浏览器。清除浏览器数据会同时清除密码和财务数据，请定期导出备份。</p>
        <button onClick={submit} className="w-full mt-4 bg-indigo-600 text-white rounded-lg py-2.5 font-medium">保存新密码</button>
      </div>
    </div>
  );
}

const rootEl = ReactDOM.createRoot(document.getElementById('root'));
document.getElementById('root').className = 'min-h-screen';
rootEl.render(React.createElement(PasswordGate));
</script>
</body>
</html>
